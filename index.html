<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>计算机软件测试员——理论题库测试</title>
<style>
  :root {
    --bg: #f3f4f6;
    --surface: #ffffff;
    --surface-hover: #f9fafb;
    --surface-active: #f3f4f6;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --text-primary: #111827;
    --text-secondary: #4b5563;
    --text-tertiary: #9ca3af;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --primary-hover: #1d4ed8;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --warning: #f59e0b;
    --warning-light: #fffbeb;
    --danger: #dc2626;
    --danger-light: #fef2f2;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
    --transition-fast: 0.15s ease;
    --transition-base: 0.25s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 800px; margin: 0 auto; min-height: 100vh; }
  .page { animation: fadeIn 0.35s ease; padding: 0 16px 32px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  h2 { font-size: 20px; font-weight: 600; }
  .text-secondary { color: var(--text-secondary); }
  .text-tertiary { color: var(--text-tertiary); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 24px; border: none; border-radius: var(--radius-md);
    font-size: 15px; font-weight: 500; cursor: pointer; transition: all var(--transition-fast);
    min-height: 44px; min-width: 88px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-secondary { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface-hover); border-color: var(--border-strong); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-ghost { background: transparent; color: var(--text-secondary); }
  .btn-ghost:hover { background: var(--surface-active); }
  .btn-lg { padding: 14px 40px; font-size: 17px; min-height: 52px; }
  .btn-sm { padding: 8px 16px; font-size: 13px; min-height: 36px; }

  .home-header { padding: 48px 0 32px; text-align: center; }
  .home-header h1 { margin-bottom: 8px; }
  .home-header p { font-size: 15px; color: var(--text-secondary); }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card {
    background: var(--surface); border-radius: var(--radius-md); padding: 20px 12px;
    text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    transition: transform var(--transition-fast);
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .stat-card .num { font-size: 28px; font-weight: 700; color: var(--primary); line-height: 1; }
  .stat-card .label { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }
  .home-action { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; padding-bottom: 24px; }

  .exam-sticky {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .sticky-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .progress-bar-wrap { flex: 1; max-width: 280px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.4s ease; width: 0%; }
  .progress-text { font-size: 13px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
  .timer { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--primary); }

  .nav-section { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); margin: 16px 0; overflow: hidden; }
  .nav-header {
    display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
    cursor: pointer; user-select: none; border-bottom: 1px solid transparent; transition: border-color var(--transition-fast);
  }
  .nav-header:hover { background: var(--surface-hover); }
  .nav-header.open { border-bottom-color: var(--border); }
  .nav-header h2 { font-size: 15px; font-weight: 500; }
  .nav-toggle { font-size: 12px; color: var(--text-tertiary); transition: transform var(--transition-fast); }
  .nav-header.open .nav-toggle { transform: rotate(180deg); }
  .nav-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; padding: 0 16px; }
  .nav-body.open { max-height: 500px; padding: 12px 16px; }
  .nav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 6px; }
  .nav-item {
    height: 40px; display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius-sm); background: var(--bg); cursor: pointer;
    font-size: 13px; font-weight: 500; transition: all var(--transition-fast);
    border: 2px solid transparent; color: var(--text-secondary);
  }
  .nav-item:hover { background: var(--border); color: var(--text-primary); }
  .nav-item.answered { background: var(--primary); color: #fff; }
  .nav-item.current { border-color: var(--primary); color: var(--primary); background: var(--primary-light); font-weight: 700; }
  .nav-item.marked { position: relative; }
  .nav-item.marked::after {
    content: ''; position: absolute; top: 3px; right: 3px; width: 6px; height: 6px;
    background: var(--warning); border-radius: 50%;
  }

  .q-card { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); padding: 24px; box-shadow: var(--shadow-sm); }
  .q-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .q-num { font-size: 15px; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 2px 10px; border-radius: var(--radius-sm); }
  .q-type { font-size: 12px; font-weight: 500; padding: 2px 8px; border-radius: var(--radius-sm); }
  .q-type.single { background: var(--primary-light); color: var(--primary); }
  .q-type.multiple { background: var(--warning-light); color: var(--warning); }
  .q-title { font-size: 17px; font-weight: 500; line-height: 1.7; color: var(--text-primary); word-break: break-word; }
  .q-title br { display: block; content: ''; margin-bottom: 6px; }

  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .option {
    display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
    border: 1.5px solid var(--border); border-radius: var(--radius-md);
    cursor: pointer; transition: all var(--transition-fast); background: var(--surface);
    position: relative;
  }
  .option:hover { border-color: var(--primary); background: var(--primary-light); }
  .option:active { transform: scale(0.995); }
  .option.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
  .option.correct { border-color: var(--success); background: var(--success-light); box-shadow: 0 0 0 3px rgba(22,163,74,0.08); cursor: default; }
  .option.correct .option-key { background: var(--success); color: #fff; }
  .option.wrong-option { border-color: var(--danger); background: var(--danger-light); box-shadow: 0 0 0 3px rgba(220,38,38,0.06); cursor: default; }
  .option.wrong-option .option-key { background: var(--danger); color: #fff; }
  .option input { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; cursor: pointer; accent-color: var(--primary); }
  .option input:disabled { cursor: default; }
  .option-text { font-size: 15px; line-height: 1.5; color: var(--text-primary); }
  .option-key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%; background: var(--bg);
    font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-right: 4px;
    transition: all var(--transition-fast);
  }
  .option.selected .option-key { background: var(--primary); color: #fff; }

  .q-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; flex-wrap: wrap; }
  .q-actions .group { display: flex; gap: 8px; }

  .result-hero { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); padding: 32px 20px; text-align: center; box-shadow: var(--shadow-sm); margin-top: 16px; }
  .donut { position: relative; width: 140px; height: 140px; margin: 0 auto 16px; }
  .donut svg { transform: rotate(-90deg); }
  .donut-track { fill: none; stroke: var(--border); stroke-width: 10; }
  .donut-fill { fill: none; stroke: var(--success); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .donut-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: 700; color: var(--text-primary); }
  .result-meta { display: flex; justify-content: center; gap: 32px; margin-top: 20px; flex-wrap: wrap; }
  .meta-item { text-align: center; }
  .meta-num { font-size: 22px; font-weight: 700; }
  .meta-label { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-correct .meta-num { color: var(--success); }
  .meta-wrong .meta-num { color: var(--danger); }
  .meta-empty .meta-num { color: var(--warning); }

  .result-toolbar { display: flex; gap: 8px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
  .chip { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: all var(--transition-fast); }
  .chip:hover { border-color: var(--border-strong); background: var(--surface-hover); }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .result-list { display: flex; flex-direction: column; gap: 8px; }
  .r-item { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); overflow: hidden; transition: box-shadow var(--transition-fast); }
  .r-item:hover { box-shadow: var(--shadow-md); }
  .r-summary { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .r-summary:hover { background: var(--surface-hover); }
  .r-badge { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-sm); white-space: nowrap; }
  .r-badge.correct { background: var(--success-light); color: var(--success); }
  .r-badge.wrong { background: var(--danger-light); color: var(--danger); }
  .r-badge.empty { background: var(--warning-light); color: var(--warning); }
  .r-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .r-arrow { font-size: 12px; color: var(--text-tertiary); transition: transform var(--transition-fast); }
  .r-item.open .r-arrow { transform: rotate(180deg); }
  .r-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .r-item.open .r-detail { max-height: 400px; }
  .r-body { padding: 0 16px 16px; border-top: 1px solid var(--border); margin-top: 0; }
  .r-options { margin: 12px 0; display: flex; flex-direction: column; gap: 6px; }
  .r-opt { font-size: 13px; padding: 6px 10px; border-radius: var(--radius-sm); background: var(--bg); color: var(--text-secondary); }
  .r-opt.correct { background: var(--success-light); color: var(--success); font-weight: 500; }
  .r-opt.wrong { background: var(--danger-light); color: var(--danger); }
  .r-answer-row { display: flex; gap: 24px; font-size: 13px; color: var(--text-secondary); flex-wrap: wrap; }
  .r-answer-row strong { color: var(--text-primary); }

  .hidden { display: none !important; }
  .center { text-align: center; }

  @media (max-width: 640px) {
    h1 { font-size: 22px; }
    .stats-row { grid-template-columns: 1fr; }
    .q-card { padding: 18px; }
    .q-title { font-size: 16px; }
    .option { padding: 12px; }
    .exam-sticky { padding: 10px 12px; }
    .progress-bar-wrap { max-width: 160px; }
    .result-meta { gap: 20px; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Home -->
  <div id="page-home" class="page">
    <div class="home-header">
      <h1>计算机软件测试员理论题库</h1>
      <p>每次随机抽取 90 题进行模拟测试，或使用全部题库逐题练习</p>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="num">442</div>
        <div class="label">题库总量</div>
      </div>
      <div class="stat-card">
        <div class="num">342</div>
        <div class="label">单选题</div>
      </div>
      <div class="stat-card">
        <div class="num">50</div>
        <div class="label">多选题</div>
      </div>
      <div class="stat-card"><div class="num">50</div><div class="label">判断题</div></div>
    </div>
    <div class="home-action">
      <button class="btn btn-primary btn-lg" onclick="startExam()">开始测试</button>
      <button class="btn btn-secondary btn-lg" onclick="startPractice()">刷题模式</button>
    </div>
  </div>

  <!-- Exam -->
  <div id="page-exam" class="page hidden">
    <div class="exam-sticky">
      <div class="sticky-left">
        <button class="btn btn-ghost btn-sm" onclick="goHome()">← 退出</button>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <span class="progress-text" id="progress-text">0 / 90</span>
      </div>
      <div class="timer" id="timer">00:00</div>
    </div>

    <div class="nav-section">
      <div class="nav-header open" id="nav-header" onclick="toggleNav()">
        <h2>题号导航 <span class="text-tertiary" style="font-weight:400;font-size:13px;">（点击折叠）</span></h2>
        <span class="nav-toggle">▼</span>
      </div>
      <div class="nav-body open" id="nav-body">
        <div class="nav-grid" id="nav-grid"></div>
      </div>
    </div>

    <div class="q-card">
      <div class="q-header">
        <span class="q-num" id="q-num">1</span>
        <span class="q-type single" id="q-type">单选</span>
      </div>
      <div class="q-title" id="q-title"></div>
      <div class="options" id="q-options"></div>
      <div class="q-actions">
        <div class="group">
          <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()">上一题</button>
        </div>
        <div class="group">
          <button class="btn btn-secondary" id="btn-mark" onclick="markCurrent()">标记</button>
          <button class="btn btn-danger" onclick="submitExam()">提交</button>
          <button class="btn btn-secondary" id="btn-next" onclick="nextQuestion()">下一题</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Practice -->
  <div id="page-practice" class="page hidden">
    <div class="exam-sticky">
      <div class="sticky-left">
        <button class="btn btn-ghost btn-sm" onclick="goHome()">← 退出</button>
        <div class="progress-bar-wrap"><div class="progress-bar" id="practice-progress-bar"></div></div>
        <span class="progress-text" id="practice-progress-text">0 / 442</span>
      </div>
    </div>
    <div class="q-card">
      <div class="q-header">
        <span class="q-num" id="p-num">1</span>
        <span class="q-type single" id="p-type">单选</span>
      </div>
      <div class="q-title" id="p-title"></div>
      <div class="options" id="p-options"></div>
      <div id="p-confirm-wrap" class="center" style="margin-top: 16px; display: none;">
        <button class="btn btn-primary" onclick="confirmPracticeAnswer()">确认答案</button>
      </div>
      <div id="p-result" class="hidden" style="margin-top: 20px; padding: 16px; border-radius: var(--radius-md); background: var(--bg);">
        <div id="p-result-status" style="font-weight: 600; margin-bottom: 8px;"></div>
        <div style="font-size: 14px; color: var(--text-secondary);">
          你的答案：<strong id="p-user-ans"></strong>　|　
          正确答案：<strong id="p-correct-ans" style="color: var(--success);"></strong>
        </div>
      </div>
      <div class="q-actions">
        <button class="btn btn-secondary" id="btn-p-prev" onclick="prevPractice()">上一题</button>
        <button class="btn btn-primary hidden" id="btn-p-next" onclick="nextPractice()">下一题</button>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div id="page-result" class="page hidden">
    <div class="result-hero">
      <div class="donut">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle class="donut-track" cx="70" cy="70" r="60"></circle>
          <circle class="donut-fill" id="donut-fill" cx="70" cy="70" r="60"
            stroke-dasharray="377" stroke-dashoffset="377"></circle>
        </svg>
        <div class="donut-text" id="donut-text">0%</div>
      </div>
      <div class="result-meta">
        <div class="meta-item meta-correct"><div class="meta-num" id="meta-correct">0</div><div class="meta-label">答对</div></div>
        <div class="meta-item meta-wrong"><div class="meta-num" id="meta-wrong">0</div><div class="meta-label">答错</div></div>
        <div class="meta-item meta-empty"><div class="meta-num" id="meta-empty">0</div><div class="meta-label">未答</div></div>
      </div>
    </div>
    <div class="result-toolbar">
      <button class="chip active" onclick="filterResult('all', this)">全部</button>
      <button class="chip" onclick="filterResult('wrong', this)">答错</button>
      <button class="chip" onclick="filterResult('empty', this)">未答</button>
    </div>
    <div class="result-list" id="result-list"></div>
    <div class="center" style="margin-top: 24px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="startExam()">重新测试</button>
      <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
    </div>
  </div>

  <!-- Practice Summary -->
  <div id="page-practice-summary" class="page hidden">
    <div class="result-hero">
      <div class="donut">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle class="donut-track" cx="70" cy="70" r="60"></circle>
          <circle class="donut-fill" id="practice-donut-fill" cx="70" cy="70" r="60"
            stroke-dasharray="377" stroke-dashoffset="377"></circle>
        </svg>
        <div class="donut-text" id="practice-donut-text">0%</div>
      </div>
      <div class="result-meta">
        <div class="meta-item meta-correct"><div class="meta-num" id="practice-meta-correct">0</div><div class="meta-label">答对</div></div>
        <div class="meta-item meta-wrong"><div class="meta-num" id="practice-meta-wrong">0</div><div class="meta-label">答错</div></div>
      </div>
    </div>
    <div class="center" style="margin-top: 24px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="startPractice()">重新刷题</button>
      <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
    </div>
  </div>
</div>

<script>

,{"key":"E","text":"协调能力"}],"answer":"ABCDE","type":"multiple"},{"id":159,"question":"以下关于单元测试的叙述，正确的是(????????)。","options":[{"key":"A","text":"单元测试是指对软件中的最小可测试单元进行检查和验证"},{"key":"B","text":"单元测试是在软件开发过程中要进行的最低级别的测试活动"},{"key":"C","text":"结构化编程语言中的测试单元一般是函数或子过程"},{"key":"D","text":"单元测试不能由程序员自己完成"},{"key":"E","text":"单元测试不需要考虑全局数据结构的影响。"}],"answer":"ABC","type":"multiple"},{"id":160,"question":"在进行性能测试之前，需要准备(????????)工作?","options":[{"key":"A","text":"制定测试计划"},{"key":"B","text":"准备测试数据"},{"key":"C","text":"配置测试环境"},{"key":"D","text":"编写测试用例"},{"key":"E","text":"部署生产环境"}],"answer":"ABCD","type":"multiple"},{"id":161,"question":"设计系统测试计划需要参考的项目文挡有(????????)。","options":[{"key":"A","text":"软件测试计划"},{"key":"B","text":"可行性研究报告"},{"key":"C","text":"软件需求规范"},{"key":"D","text":"迭代计划"},{"key":"E","text":"项目成本预算"}],"answer":"ACD","type":"multiple"},{"id":162,"question":"在进行回归测试时，测试人员应关注(????????)内容?","options":[{"key":"A","text":"已修复缺陷的验证"},{"key":"B","text":"新增功能的测试"},{"key":"C","text":"所有功能的重新测试"},{"key":"D","text":"忽略之前未发现的缺陷"},{"key":"E","text":"项目的初步需求调研"}],"answer":"AB","type":"multiple"},{"id":163,"question":"以下关于回归测试的叙述中，正确的是(????????)。","options":[{"key":"A","text":"回归测试是为了确保改动不会带来不可预料的后果或错误"},{"key":"B","text":"回归测试需要针对修改过的软件成分进行测试"},{"key":"C","text":"回归测试需要能够测试软件的所有功能的代表性测试用例"},{"key":"D","text":"回归测试不容易实现自动化"},{"key":"E","text":"回归测试可以完全取代其他类型的测试。"}],"answer":"ABC","type":"multiple"},{"id":164,"question":"以下关于性能测试的叙述中，正确的是(????????)。","options":[{"key":"A","text":"性能测试的目的是为了验证软件系统是否能够达到用户提出的性能指标"},{"key":"B","text":"性能测试不用于发现软件系统中存在的性能瓶颈"},{"key":"C","text":"性能测试类型包括负载测试，强度测试，容量测试等"},{"key":"D","text":"性能测试常通过工具来模拟大量用户操作,增加系统负载"},{"key":"E","text":"性能测试不需要考虑系统的硬件和网络环境。"}],"answer":"ACD","type":"multiple"},{"id":165,"question":"在进行可用性测试时关注的问题应包括(????????)。","options":[{"key":"A","text":"安装过程是否困难"},{"key":"B","text":"错误提示是否明确"},{"key":"C","text":"GUI 接口是否标准"},{"key":"D","text":"登录是否方便"},{"key":"E","text":"帮助文本是否上下文敏感"}],"answer":"ABCDE","type":"multiple"},{"id":1 ":"泄露用户隐私"},{"key":"C","text":"尊重知识产权"},{"key":"D","text":"保护用户隐私"}],"answer":"B","type":"single"},{"id":179,"question":"计算机软件测试员在测试过程中应遵循的职业道德原则是(????????)。","options":[{"key":"A","text":"忽视软件中的小缺陷"},{"key":"B","text":"客观公正，保持诚实与透明"},{"key":"C","text":"追求个人利益最大化"},{"key":"D","text":"优先完成测试任务"}],"answer":"A","type":"single"},{"id":180,"question":"以下关于 Web 系统测试的测试策略的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"按系统架构划分，包括客户端测试、服务端测试和网络测试"},{"key":"B","text":"按职能划分，包括应用功能的测试、 Web 应用服务的测试等"},{"key":"C","text":"按质量特性划分，包括功能测试、性能测试等"},{"key":"D","text":"按开发阶段划分，包括客户端开发的测试、服务端开发的测试等"}],"answer":"D","type":"single"},{"id":181,"question":"测试结果中的“失败”通常指(????????)。","options":[{"key":"A","text":"测试用例编写错误"},{"key":"B","text":"测试环境搭建不当"},{"key":"C","text":"功能表现与预期不符"},{"key":"D","text":"测试人员操作失误"}],"answer":"C","type":"single"},{"id":182,"question":"在进行黑盒测试时，测试人员主要关注(????????)。","options":[{"key":"A","text":"代码的结构和逻辑"},{"key":"B","text":"用户的需求和功能"},{"key":"C","text":"系统的内部状态"},{"key":"D","text":"程序的性能表现"}],"answer":"B","type":"single"},{"id":183,"question":"下列(????????)不是计算机病毒的特点?","options":[{"key":"A","text":"传染性"},{"key":"B","text":"破坏性"},{"key":"C","text":"免疫性"},{"key":"D","text":"潜伏性"}],"answer":"C","type":"single"},{"id":184,"question":"在准备自动化测试脚本时，以下(????????)不是必要的步骤?","options":[{"key":"A","text":"分析测试需求"},{"key":"B","text":"设计测试场景"},{"key":"C","text":"确定测试数据"},{"key":"D","text":"编写详细的设计文档"}],"answer":"D","type":"single"},{"id":185,"question":"对于回归测试，以下(????????)描述是准确的?","options":[{"key":"A","text":"只对新功能进行测试"},{"key":"B","text":"对已修复的缺陷进行测试"},{"key":"C","text":"对所有已完成的测试重新执行"},{"key":"D","text":"只在系统发布前进行测试"}],"answer":"B","type":"single"},{"id":186,"question":"在进行性能测试时，测试人员需要关注以下(????????)指标?","options":[{"key":"A","text":"代码的复杂度"},{"key":"B","text":"用户的年龄分布"},{"key":"C","text":"系统的响应时间"},{"key":"D","text":"界面的美观程度"}],"answer":"C","type":"single"},{"id":187,"question":"下列(????????)不是计算机网络的基本功能?","options":[{"key":"A","text":"数据通信"},{"key":"B","text":"资源共享"},{"k text":"哈希存取"}],"answer":"A","type":"single"},{"id":197,"question":"在软件测试准备阶段，编写测试计划的主要目的是(????????)。","options":[{"key":"A","text":"确定测试方法"},{"key":"B","text":"记录测试结果"},{"key":"C","text":"指导测试执行"},{"key":"D","text":"评估测试质量"}],"answer":"C","type":"single"},{"id":198,"question":"白盒测试实施中，测试覆盖率越高，通常说明(????????)。","options":[{"key":"A","text":"程序性能越好"},{"key":"B","text":"代码可读性越高"},{"key":"C","text":"测试越全面"},{"key":"D","text":"用户体验越好"}],"answer":"C","type":"single"},{"id":199,"question":"白盒测试实施时，测试覆盖率低可能意味着(????????)。","options":[{"key":"A","text":"程序性能差"},{"key":"B","text":"测试不充分"},{"key":"C","text":"用户体验不佳"},{"key":"D","text":"代码质量高"}],"answer":"B","type":"single"},{"id":200,"question":"操作系统的主要任务是(????????)。","options":[{"key":"A","text":"把源程序转换为目标代码"},{"key":"B","text":"负责文字格式编排和数据计算"},{"key":"C","text":"负责存取数据库中的各种数据,完成 SQL 查询"},{"key":"D","text":"管理计算机系统中的软、硬件资源"}],"answer":"D","type":"single"},{"id":201,"question":"负载压力测试的目的不包括(????????)。","options":[{"key":"A","text":"在模拟环境下评估系统服务等级满足情况"},{"key":"B","text":"预测系统负载压力承受力"},{"key":"C","text":"分析系统的瓶颈"},{"key":"D","text":"在应用实际部署前评估性能"}],"answer":"A","type":"single"},{"id":202,"question":"以下(????????)不是测试准备阶段的工作?","options":[{"key":"A","text":"制定测试计划"},{"key":"B","text":"编写测试脚本"},{"key":"C","text":"修复已知缺陷"},{"key":"D","text":"分配测试资源"}],"answer":"C","type":"single"},{"id":203,"question":"自动化测试实施中，(????????)持续提高测试效率?","options":[{"key":"A","text":"增加测试工具的数量"},{"key":"B","text":"简化测试流程"},{"key":"C","text":"减少测试用例的数量"},{"key":"D","text":"延长测试执行时间"}],"answer":"B","type":"single"},{"id":204,"question":"以下对软件测试对象的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"软件测试不只是程序测试"},{"key":"B","text":"开发中产生的各种文档也是软件测试的对象"},{"key":"C","text":"使用的开发工具也是软件测试的对象"},{"key":"D","text":"软件的相关数据也是软件测试的对象"}],"answer":"C","type":"single"},{"id":205,"question":"自动化测试实施时，测试脚本与测试用例的关系应该是(????????)。","options":[{"key":"A","text":"一一对应"},{"key":"B","text":"多对一"},{"key":"C","text":"一对多"},{"key":"D","text":"无固定关系"}],"answer":"A","type":"single"},{" function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

  document.getElementById(id).classList.remove('hidden');
  window.scrollTo(0, 0);
}

function goHome() {
  if (timerInterval) clearInterval(timerInterval);
  showPage('page-home');
}

/* ========== Exam Mode ========== */
function startExam() {
  examQuestions = shuffle(ALL_QUESTIONS).slice(0, 90);
  answers = {};
  currentIndex = 0;
  marked = new Set();
  startTime = Date.now();
  showPage('page-exam');
  updateProgress();
  renderNav();
  renderQuestion();
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const el = document.getElementById('timer');
  timerInterval = setInterval(() => {
    const sec = Math.floor((Date.now() - startTime) / 1000);
    el.textContent = formatTime(sec);
  }, 1000);
}

function updateProgress() {
  const answered = Object.values(answers).filter(a => a.length > 0).length;
  const pct = (answered / 90) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = answered + ' / 90';
}

function toggleNav() {
  const header = document.getElementById('nav-header');
  const body = document.getElementById('nav-body');
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function renderNav() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = '';
  examQuestions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.textContent = i + 1;
    if (answers[q.id] && answers[q.id].length) div.classList.add('answered');
    if (i === currentIndex) div.classList.add('current');
    if (marked.has(q.id)) div.classList.add('marked');
    div.onclick = () => { currentIndex = i; renderQuestion(); };
    grid.appendChild(div);
  });
}

function renderQuestion() {
  const q = examQuestions[currentIndex];
  document.getElementById('q-num').textContent = currentIndex + 1;
  const typeEl = document.getElementById('q-type');
  typeEl.textContent = q.type === 'multiple' ? '多选' : '单选';
  typeEl.className = 'q-type ' + q.type;
  document.getElementById('q-title').innerHTML = escapeHtml(q.question).replace(/\n/g, '<br>');

  const optsEl = document.getElementById('q-options');
  optsEl.innerHTML = '';
  const type = q.type === 'multiple' ? 'checkbox' : 'radio';
  const name = 'opt-' + q.id;
  const userAns = answers[q.id] || [];

  q.options.forEach(opt => {
    const label = document.createElement('label');
    label.className = 'option';
    if (userAns.includes(opt.key)) label.classList.add('selected');

    const input = document.createElement('input');
    input.type = type;
    input.name = name;
    input.value = opt.key;
    input.checked = userAns.includes(opt.key);
    input.onchange = () => onOptionChange(q, type);

    const span = document.createElement('span');
    span.className = 'option-text';
    span.innerHTML = '<span class="option-key">' + opt.key + '</span>' + escapeHtml(opt.text);

    label.appendChild(input);
    label.appendChild(span);
    optsEl.appendChild(label);
  });

  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === examQuestions.length - 1;
  const markBtn = document.getElementById('btn-mark');
  markBtn.textContent = marked.has(q.id) ? '取消标记' : '标记';

  renderNav();
  updateProgress();
}

function onOptionChange(q, type) {
  const inputs = document.querySelectorAll('input[name="opt-' + q.id + '"]');
  const vals = Array.from(inputs).filter(i => i.checked).map(i => i.value);
  answers[q.id] = vals;

  inputs.forEach(inp => {
    const label = inp.closest('.option');
    if (inp.checked) label.classList.add('selected');
    else label.classList.remove('selected');
  });

  renderNav();
  updateProgress();
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIndex < examQuestions.length - 1) { currentIndex++; renderQuestion(); }
}

function markCurrent() {
  const q = examQuestions[currentIndex];
  if (marked.has(q.id)) marked.delete(q.id);
  else marked.add(q.id);
  renderQuestion();
}

function submitExam() {
  const answered = Object.values(answers).filter(a => a.length > 0).length;
  let msg = '确定要提交试卷吗？';
  if (answered < 90) msg += '\n你还有 ' + (90 - answered) + ' 题未作答。';
  if (!confirm(msg)) return;
  if (timerInterval) clearInterval(timerInterval);
  showResult();
}

function showResult() {
  showPage('page-result');
  let correct = 0, wrong = 0, empty = 0;
  examQuestions.forEach(q => {
    const ua = answers[q.id] || [];
    if (ua.length === 0) { empty++; }
    else {
      const userSorted = ua.slice().sort().join('');
      const ansSorted = q.answer.split('').sort().join('');
      if (userSorted === ansSorted) correct++;
      else wrong++;
    }
  });

  const pct = Math.round((correct / 90) * 100);
  document.getElementById('donut-text').textContent = pct + '%';
  document.getElementById('meta-correct').textContent = correct;
  document.getElementById('meta-wrong').textContent = wrong;
  document.getElementById('meta-empty').textContent = empty;

  const circumference = 2 * Math.PI * 60;
  const offset = circumference - (correct / 90) * circumference;
  requestAnimationFrame(() => {
    document.getElementById('donut-fill').style.strokeDashoffset = offset;
  });

  renderResultList('all');
}

function renderResultList(filter) {
  const list = document.getElementById('result-list');
  list.innerHTML = '';
  examQuestions.forEach((q, idx) => {
    const ua = answers[q.id] || [];
    const userSorted = ua.slice().sort().join('');
    const ansSorted = q.answer.split('').sort().join('');
    let status = '';
    if (ua.length === 0) status = 'empty';
    else if (userSorted === ansSorted) status = 'correct';
    else status = 'wrong';

    if (filter !== 'all' && filter !== status) return;

    const item = document.createElement('div');
    item.className = 'r-item';
    item.dataset.open = 'false';

    const statusText = status === 'correct' ? '正确' : (status === 'wrong' ? '错误' : '未答');
    const userAnsText = ua.length ? ua.sort().join('、') : '—';
    const correctAnsText = q.answer.split('').sort().join('、');

    let optionsHtml = '';
    q.options.forEach(opt => {
      let cls = 'r-opt';
      const isCorrect = q.answer.includes(opt.key);
      const isChosen = ua.includes(opt.key);
      if (isCorrect) cls += ' correct';
      else if (isChosen && !isCorrect) cls += ' wrong';
      optionsHtml += '<div class="' + cls + '">' + opt.key + '. ' + escapeHtml(opt.text) + '</div>';
    });

    item.innerHTML =
      '<div class="r-summary" onclick="toggleResultItem(this)">' +
        '<span class="r-badge ' + status + '">' + statusText + '</span>' +
        '<span class="r-title">' + (idx + 1) + '. ' + escapeHtml(q.question).replace(/\n/g, ' ') + '</span>' +
        '<span class="r-arrow">▼</span>' +
      '</div>' +
      '<div class="r-detail"><div class="r-body">' +
        '<div class="r-options">' + optionsHtml + '</div>' +
        '<div class="r-answer-row">' +
          '<span>你的答案：<strong>' + userAnsText + '</strong></span>' +
          '<span>正确答案：<strong style="color:var(--success);">' + correctAnsText + '</strong></span>' +
        '</div>' +
      '</div></div>';
    list.appendChild(item);
  });
}

function toggleResultItem(el) {
  const item = el.closest('.r-item');
  item.classList.toggle('open');
}

function filterResult(type, btn) {
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResultList(type);
}

/* ========== Practice Mode ========== */
function startPractice() {
  practiceQuestions = shuffle(ALL_QUESTIONS);
  practiceIndex = 0;
  practiceAnswers = {};
  practiceChecked = new Set();
  showPage('page-practice');
  renderPracticeQuestion();
}

function renderPracticeQuestion() {
  const q = practiceQuestions[practiceIndex];
  document.getElementById('p-num').textContent = practiceIndex + 1;
  const typeEl = document.getElementById('p-type');
  typeEl.textContent = q.type === 'multiple' ? '多选' : '单选';
  typeEl.className = 'q-type ' + q.type;
  document.getElementById('p-title').innerHTML = escapeHtml(q.question).replace(/\n/g, '<br>');

  const pct = ((practiceIndex + 1) / practiceQuestions.length) * 100;
  document.getElementById('practice-progress-bar').style.width = pct + '%';
  document.getElementById('practice-progress-text').textContent = (practiceIndex + 1) + ' / ' + practiceQuestions.length;

  const optsEl = document.getElementById('p-options');
  optsEl.innerHTML = '';
  const type = q.type === 'multiple' ? 'checkbox' : 'radio';
  const name = 'p-opt-' + q.id;
  const userAns = practiceAnswers[q.id] || [];
  const isChecked = practiceChecked.has(q.id);

  q.options.forEach(opt => {
    const label = document.createElement('label');
    label.className = 'option';
    const isCorrect = q.answer.includes(opt.key);
    const isChosen = userAns.includes(opt.key);

    if (isChecked) {
      if (isCorrect) label.classList.add('correct');
      else if (isChosen) label.classList.add('wrong-option');
    } else if (isChosen) {
      label.classList.add('selected');
    }

    const input = document.createElement('input');
    input.type = type;
    input.name = name;
    input.value = opt.key;
    input.checked = isChosen;
    input.disabled = isChecked;
    input.onchange = () => onPracticeOptionChange(q);

    const span = document.createElement('span');
    span.className = 'option-text';
    span.innerHTML = '<span class="option-key">' + opt.key + '</span>' + escapeHtml(opt.text);

    label.appendChild(input);
    label.appendChild(span);
    optsEl.appendChild(label);
  });

  const confirmWrap = document.getElementById('p-confirm-wrap');
  const resultDiv = document.getElementById('p-result');
  const nextBtn = document.getElementById('btn-p-next');
  const prevBtn = document.getElementById('btn-p-prev');

  if (isChecked) {
    confirmWrap.style.display = 'none';
    resultDiv.classList.remove('hidden');
    nextBtn.classList.remove('hidden');
    const ua = userAns.slice().sort().join('');
    const ca = q.answer.split('').sort().join('');
    const isCorrect = ua === ca;
    const statusEl = document.getElementById('p-result-status');
    statusEl.textContent = isCorrect ? '✓ 回答正确' : '✗ 回答错误';
    statusEl.style.color = isCorrect ? 'var(--success)' : 'var(--danger)';
    document.getElementById('p-user-ans').textContent = userAns.length ? userAns.sort().join('、') : '无';
    document.getElementById('p-correct-ans').textContent = q.answer.split('').sort().join('、');
  } else {
    confirmWrap.style.display = q.type === 'multiple' ? 'block' : 'none';
    resultDiv.classList.add('hidden');
    nextBtn.classList.add('hidden');
  }

  prevBtn.disabled = practiceIndex === 0;
  nextBtn.textContent = practiceIndex === practiceQuestions.length - 1 ? '完成' : '下一题';
}

function onPracticeOptionChange(q) {
  const inputs = document.querySelectorAll('input[name="p-opt-' + q.id + '"]');
  const vals = Array.from(inputs).filter(i => i.checked).map(i => i.value);
  practiceAnswers[q.id] = vals;

  inputs.forEach(inp => {
    const label = inp.closest('.option');
    if (inp.checked) label.classList.add('selected');
    else label.classList.remove('selected');
  });

  if (q.type === 'single') {
    confirmPracticeAnswer();
  }
}

function confirmPracticeAnswer() {
  const q = practiceQuestions[practiceIndex];
  const ua = practiceAnswers[q.id] || [];
  if (ua.length === 0) {
    alert('请至少选择一个答案');
    return;
  }
  practiceChecked.add(q.id);
  renderPracticeQuestion();
}

function nextPractice() {
  if (practiceIndex < practiceQuestions.length - 1) {
    practiceIndex++;
    renderPracticeQuestion();
  } else {
    showPracticeSummary();
  }
}

function prevPractice() {
  if (practiceIndex > 0) {
    practiceIndex--;
    renderPracticeQuestion();
  }
}

function showPracticeSummary() {
  showPage('page-practice-summary');
  let correct = 0, wrong = 0;
  practiceQuestions.forEach(q => {
    const ua = practiceAnswers[q.id] || [];
    if (ua.length === 0) { wrong++; }
    else {
      const userSorted = ua.slice().sort().join('');
      const ansSorted = q.answer.split('').sort().join('');
      if (userSorted === ansSorted) correct++;
      else wrong++;
    }
  });
  const pct = Math.round((correct / practiceQuestions.length) * 100);
  document.getElementById('practice-donut-text').textContent = pct + '%';
  document.getElementById('practice-meta-correct').textContent = correct;
  document.getElementById('practice-meta-wrong').textContent = wrong;
  const circumference = 2 * Math.PI * 60;
  const offset = circumference - (correct / practiceQuestions.length) * circumference;
  requestAnimationFrame(() => {
    document.getElementById('practice-donut-fill').style.strokeDashoffset = offset;
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* Keyboard shortcuts */
document.addEventListener('keydown', (e) => {
  if (document.getElementById('page-exam').classList.contains('hidden') === false) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevQuestion(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextQuestion(); }
    else if (e.key === 'm' || e.key === 'M') { e.preventDefault(); markCurrent(); }
    else if (e.key >= '1' && e.key <= '5') {
      const idx = parseInt(e.key, 10) - 1;
      const q = examQuestions[currentIndex];
      if (q && q.options[idx]) {
        const inp = document.querySelector('#page-exam input[value="' + q.options[idx].key + '"]');
        if (inp) {
          e.preventDefault();
          if (q.type === 'multiple') inp.checked = !inp.checked;
          else inp.checked = true;
          inp.dispatchEvent(new Event('change'));
        }
      }
    }
  } else if (document.getElementById('page-practice').classList.contains('hidden') === false) {
    if (e.target.tagName === 'INPUT') return;
    const q = practiceQuestions[practiceIndex];
    const isChecked = q && practiceChecked.has(q.id);

    if (e.key === 'ArrowLeft') { e.preventDefault(); prevPractice(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); if (isChecked) nextPractice(); }
    else if (e.key >= '1' && e.key <= '5') {
      const idx = parseInt(e.key, 10) - 1;
      if (q && !isChecked && q.options[idx]) {
        const inp = document.querySelector('#page-practice input[value="' + q.options[idx].key + '"]');
        if (inp) {
          e.preventDefault();
          if (q.type === 'multiple') inp.checked = !inp.checked;
          else inp.checked = true;
          inp.dispatchEvent(new Event('change'));
        }
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (q && !isChecked && q.type === 'multiple') {
        confirmPracticeAnswer();
      } else if (isChecked) {
        nextPractice();
      }
    }
  }
});
</script>
