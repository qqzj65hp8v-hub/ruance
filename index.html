{"key":"B","text":"提高测试覆盖率"},{"key":"C","text":"适用于所有类型的测试"},{"key":"D","text":"更好地利用资源"}],"answer":"C","type":"single","explanation":"自动化测试不适用于所有场景，如易用性、探索性测试仍需手工执行。"},{"id":222,"question":"接口测试实施中，如何处理接口返回的异常信息(????????)?","options":[{"key":"A","text":"忽略异常信息"},{"key":"B","text":"记录异常信息并继续测试"},{"key":"C","text":"终止测试并报告异常"},{"key":"D","text":"不处理异常信息"}],"answer":"B","type":"single","explanation":"接口测试应记录异常信息并继续执行，保证测试完整性。"},{"id":223,"question":"以下关于文档测试的叙述中,不正确的是(????????)。","options":[{"key":"A","text":"文档要面向所有级别读者"},{"key":"B","text":"文档中用到的术语要符合行业规范"},{"key":"C","text":"需要检查所有信息是否真实正确"},{"key":"D","text":"需要检查软件返回结果跟文档描述是否一致"}],"answer":"A","type":"single","explanation":"文档应面向目标读者，不一定面向所有级别，术语需规范一致。"},{"id":224,"question":"接口测试实施中，如何评估测试覆盖率(????????)。","options":[{"key":"A","text":"计算测试接口数量"},{"key":"B","text":"统计测试用例数量"},{"key":"C","text":"使用测试工具自动分析"},{"key":"D","text":"不需要评估覆盖率"}],"answer":"C","type":"single","explanation":"使用测试工具自动分析接口覆盖率，可精确评估测试充分性。"},{"id":225,"question":"以下不属于单元测试中局部数据结构测试内容的是(????????)。","options":[{"key":"A","text":"不一致的数据类型说明"},{"key":"B","text":"全局变量的定义在各模块是否一致"},{"key":"C","text":"使用尚未赋值的局部变量"},{"key":"D","text":"变量错误的缺省值"}],"answer":"B","type":"single","explanation":"全局变量一致性属于集成测试或代码审查范畴，非单元测试局部数据结构内容。"},{"id":226,"question":"接口测试实施中，如何处理接口依赖关系(????????)?","options":[{"key":"A","text":"忽略依赖关系"},{"key":"B","text":"逐个测试每个接口"},{"key":"C","text":"使用Mock技术模拟依赖接口"},{"key":"D","text":"不处理依赖关系"}],"answer":"C","type":"single","explanation":"Mock技术可模拟依赖接口，解决接口间的耦合和依赖问题。"},{"id":227,"question":"以下测试项目不适合采用自动化测试的是(????????)。","options":[{"key":"A","text":"负载压力测试"},{"key":"B","text":"需要反复进行的测试"},{"key":"C","text":"易用性测试"},{"key":"D","text":"可以录制回放的测试"}],"answer":"C","type":"single","explanation":"易用性测试依赖主观感受和用户反馈，不适合完全自动化。"},{"id":228,"question":"测试结果中应包含(????????)关键信息?","options":[{"key":"A","text":"测试用例编号"},{"key":"B","text":"测试人员姓名"},{"key":"C","text":"测试结果(通过/失败)"},{"key":"D","text":"所有选项都是"}],"answer":"D","type":"single","explanation":"测试结果应包含用例编号、执行人员和结果状态等关键信息。"},{"id":229,"question":"在接口测试实施中，如何模拟用户请求(????????)?","options":[{"key":"A","text":"手动输入数据"},{"key":"B","text":"使用测试工具发送请求"},{"key":"C","text":"编写代码模拟请求"},{"key":"D","text":"通过前端界面操作"}],"answer":"B","type":"single","explanation":"接口测试通常使用Postman、JMeter等工具发送和验证请求。"},{"id":230,"question":"以下关于 web 测试的叙述中,不正确的是(????????)。","options":[{"key":"A","text":"与其它系统的测试内容不同"},{"key":"B","text":"与其它系统的测试手段基本相同"},{"key":"C","text":"与其它系统的测试重点不同"},{"key":"D","text":"与其它系统采用的测试工具部分不同"}],"answer":"A","type":"single","explanation":"Web系统与其他系统在测试内容上有共通之处，只是手段和重点不同。"},{"id":231,"question":"以下关于标准符合性测试的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"测试依据主要是行业标准"},{"key":"B","text":"包括数据内容标准、通信协议标准、幵发接口标准和信息编码标准"},{"key":"C","text":"数据内容标准描述用于数据交换与互操作的数据格式或内容规范"},{"key":"D","text":"通信协议标准描述用于数据通信与传输接口的数据格式"}],"answer":"A","type":"single","explanation":"标准符合性测试依据包括国际、国家、行业及企业标准，不限于行业标准。"},{"id":232,"question":"性能测试实施时，如何确定测试周期(????????)?","options":[{"key":"A","text":"越长越好"},{"key":"B","text":"根据项目需求"},{"key":"C","text":"越短越好"},{"key":"D","text":"随意设定"}],"answer":"B","type":"single","explanation":"性能测试周期应根据项目需求和里程碑合理确定。"},{"id":233,"question":"性能测试时，测试人员如何确定测试指标(????????)?","options":[{"key":"A","text":"随意选择"},{"key":"B","text":"根据项目需求"},{"key":"C","text":"咨询开发人员"},{"key":"D","text":"使用默认指标"}],"answer":"B","type":"single","explanation":"性能指标应基于业务需求和系统SLA来确定。"},{"id":234,"question":"以下中不属于网络测试对象的为(????????)。","options":[{"key":"A","text":"服务器"},{"key":"B","text":"路由器"},{"key":"C","text":"网段"},{"key":"D","text":"CPU"}],"answer":"D","type":"single","explanation":"CPU属于计算机硬件组件，不是网络测试对象。"},{"id":235,"question":"测试结果中的(????????)信息有助于重现缺陷?","options":[{"key":"A","text":"测试人员的姓名"},{"key":"B","text":"测试环境的配置"},{"key":"C","text":"缺陷出现的步骤和条件"},{"key":"D","text":"测试用例的编写时间"}],"answer":"C","type":"single","explanation":"缺陷重现步骤和条件是定位与修复缺陷的最关键信息。"},{"id":236,"question":"在进行负载测试时，以下(????????)不是重要的测试指标?","options":[{"key":"A","text":"响应时间"},{"key":"B","text":"吞吐量"},{"key":"C","text":"用户满意度调查"},{"key":"D","text":"资源利用率"}],"answer":"C","type":"single","explanation":"用户满意度调查属于用户体验评估，不是负载测试的技术指标。"},{"id":237,"question":"在进行性能测试时，对测试数据进行预处理主要为(????????)?","options":[{"key":"A","text":"提高测试数据的真实性"},{"key":"B","text":"降低测试复杂度"},{"key":"C","text":"确保测试数据的一致性"},{"key":"D","text":"增加测试数据量"}],"answer":"C","type":"single","explanation":"数据预处理可消除脏数据和异常值，保证测试数据一致性。"},{"id":238,"question":"信息系统进入使用阶段后，主要任务是(????????)。","options":[{"key":"A","text":"进行信息系统开发与测试"},{"key":"B","text":"进行信息系统需求分析"},{"key":"C","text":"对信息系统进行管理和维护"},{"key":"D","text":"对信息系统数据库进行设计"}],"answer":"C","type":"single","explanation":"信息系统进入使用阶段后，核心任务是运行维护、监控和优化。"},{"id":239,"question":"下列软件属性中，软件产品首要满足的应该是(????????)。","options":[{"key":"A","text":"容错、纠错能力"},{"key":"B","text":"性能需求"},{"key":"C","text":"可扩展性和灵活性"},{"key":"D","text":"功能需求"}],"answer":"D","type":"single","explanation":"软件首要满足功能需求，性能、容错等属于非功能需求。"},{"id":240,"question":"测试报告的主要作用是(????????)。","options":[{"key":"A","text":"记录测试过程"},{"key":"B","text":"展示测试结果"},{"key":"C","text":"指导测试执行"},{"key":"D","text":"评估测试人员能力"}],"answer":"B","type":"single","explanation":"测试报告的核心作用是展示测试结果，为决策提供依据。"},{"id":241,"question":"性能测试中，为(????????)要模拟用户行为?","options":[{"key":"A","text":"为了测试系统的功能"},{"key":"B","text":"为了评估系统的性能"},{"key":"C","text":"为了找出代码中的错误"},{"key":"D","text":"为了优化用户体验"}],"answer":"B","type":"single","explanation":"模拟用户行为是为了在真实场景下评估系统性能表现。"},{"id":242,"question":"在准备兼容性测试时，以下(????????)不是需要考虑的?","options":[{"key":"A","text":"不同操作系统的版本"},{"key":"B","text":"浏览器的类型"},{"key":"C","text":"网络连接的速度"},{"key":"D","text":"用户的个人喜好"}],"answer":"D","type":"single","explanation":"兼容性测试关注软硬件环境差异，用户个人喜好不属于技术范畴。"},{"id":243,"question":"以下关于软件测试目的的叙述中,不正确的是(????????)。","options":[{"key":"A","text":"测试是程序的执行过程,目的在于发现错误"},{"key":"B","text":"一个好的测试用例在于能发现至今未发现的错误"},{"key":"C","text":"分析错误产生原因不便于软件过程改进"},{"key":"D","text":"通过对测试结果分析整理,可以修正软件开发规则"}],"answer":"C","type":"single","explanation":"分析错误原因有助于改进开发和测试过程，提升软件质量。"},{"id":244,"question":"性能测试中，并发用户数增加可能会导致(????????)结果?","options":[{"key":"A","text":"响应时间减少"},{"key":"B","text":"吞吐量增加"},{"key":"C","text":"资源利用率下降"},{"key":"D","text":"系统稳定性下降"}],"answer":"D","type":"single","explanation":"并发增加可能导致资源竞争、响应变慢和系统稳定性下降。"},{"id":245,"question":"不属于网络测试的测试类型为(????????)。","options":[{"key":"A","text":"可靠性测试"},{"key":"B","text":"可接受性测试"},{"key":"C","text":"存储容量测试"},{"key":"D","text":"吞吐量测试"}],"answer":"C","type":"single","explanation":"存储容量测试属于硬件或数据库测试，不属于网络测试类型。"},{"id":246,"question":"在进行性能测试时，以下(????????)指标可以反映系统的可扩展性?","options":[{"key":"A","text":"响应时间"},{"key":"B","text":"吞吐量"},{"key":"C","text":"并发用户数"},{"key":"D","text":"资源利用率"}],"answer":"B","type":"single","explanation":"吞吐量反映系统处理请求的能力，是衡量可扩展性的关键指标。"},{"id":247,"question":"在性能测试中，(????????)指标通常用于表示单位时间内系统成功处理的请求数?","options":[{"key":"A","text":"响应时间"},{"key":"B","text":"吞吐量"},{"key":"C","text":"并发用户数"},{"key":"D","text":"错误率"}],"answer":"B","type":"single","explanation":"吞吐量定义为单位时间内系统成功处理的请求数量。"},{"id":248,"question":"在团队合作中，软件测试员应如何体现职业道德(????????)?","options":[{"key":"A","text":"尊重并信任团队成员"},{"key":"B","text":"随意指责和批评同事的工作"},{"key":"C","text":"积极分享测试经验和技巧"},{"key":"D","text":"遵守团队的工作流程和规范"},{"key":"E","text":"保护项目信息和用户数据的安全与隐私"}],"answer":"ACDE","type":"multiple","explanation":"测试员应尊重信任团队成员、分享经验、遵守规范并保护数据安全。"},{"id":249,"question":"在测试实施阶段，以下(????????)做法是不正确的?","options":[{"key":"A","text":"测试人员随意更改测试用例"},{"key":"B","text":"测试人员忽略已知缺陷"},{"key":"C","text":"测试团队与开发团队紧密协作"},{"key":"D","text":"测试人员不记录测试结果"},{"key":"E","text":"测试人员不按照测试计划执行测试"}],"answer":"ABDE","type":"multiple","explanation":"测试应严格按计划执行，随意更改、忽略缺陷或不记录均不正确。"},{"id":250,"question":"在制定测试计划时，以下(????????)做法是正确的?","options":[{"key":"A","text":"明确测试目标"},{"key":"B","text":"忽略测试风险"},{"key":"C","text":"合理安排测试资源"},{"key":"D","text":"制定详细的测试进度表"},{"key":"E","text":"充分考虑测试范围与测试策略"}],"answer":"ACDE","type":"multiple","explanation":"测试计划应明确目标、合理安排资源、制定进度并充分考虑范围与策略。"},{"id":251,"question":"用户口令测试应考虑的测试点包括(????????)。","options":[{"key":"A","text":"口令时效"},{"key":"B","text":"口令长度"},{"key":"C","text":"口令复杂度"},{"key":"D","text":"口令锁定"},{"key":"E","text":"口令传输与存储安全"}],"answer":"ABCDE","type":"multiple","explanation":"口令测试需覆盖时效、长度、复杂度、锁定策略及传输存储安全。"},{"id":252,"question":"测试报告中可能包含(????????)图表来辅助分析?","options":[{"key":"A","text":"缺陷分布图"},{"key":"B","text":"测试用例执行状态图"},{"key":"C","text":"性能指标对比图"},{"key":"D","text":"用户反馈统计图"},{"key":"E","text":"模块测试覆盖率图"}],"answer":"ABCDE","type":"multiple","explanation":"测试报告常用缺陷分布、用例执行状态、性能对比和覆盖率等图表辅助分析。"},{"id":253,"question":"以下关于因果图法测试的叙述中,正确的是(????????)。","options":[{"key":"A","text":"因果图法是从自然语言书写的程序规格说明中找出因和果"},{"key":"B","text":"因果图法不一定需要把因果图转成判定表"},{"key":"C","text":"为了去掉不可能出现的因果组合,需要标明约束条件"},{"key":"D","text":"如果设计阶段就采用了判定表,则不必再画因果图"},{"key":"E","text":"因果图法仅适用于具有简单因果关系的系统"}],"answer":"ACD","type":"multiple","explanation":"因果图法从规格说明中提取因果关系，通过约束条件去掉不可能组合。"},{"id":254,"question":"以下关于数据流图的叙述中,正确的是(????????)。","options":[{"key":"A","text":"分层数据流图可以清晰地对稍微复杂一些的实际问题建模"},{"key":"B","text":"用来描述数据流从输 入到输出的变换流程"},{"key":"C","text":"能清晰地表达加工的处理过程"},{"key":"D","text":"不能表示实体之间的关系"},{"key":"E","text":"每条数据流的起点和终点必须是加工"}],"answer":"ABD","type":"multiple","explanation":"数据流图描述数据从输入到输出的变换流程，不适合表达实体关系。"},{"id":255,"question":"测试实施阶段，如何评估测试进度(????????)?","options":[{"key":"A","text":"仅看测试用例执行情况"},{"key":"B","text":"综合考虑测试用例执行和缺陷情况"},{"key":"C","text":"只关注缺陷发现数量"},{"key":"D","text":"评估测试覆盖率"},{"key":"E","text":"只考虑测试资源的利用情况"}],"answer":"BD","type":"multiple","explanation":"测试进度需综合用例执行、缺陷趋势和覆盖率等多维度评估。"},{"id":256,"question":"软件测试的结果可以用来做(????????)?","options":[{"key":"A","text":"评估软件质量"},{"key":"B","text":"指导软件开发"},{"key":"C","text":"制定测试计划"},{"key":"D","text":"确定发布日期"},{"key":"E","text":"为项目决策提供数据支持"}],"answer":"ABE","type":"multiple","explanation":"测试结果可用于评估质量、指导开发和为项目决策提供数据支撑。"},{"id":257,"question":"测试实施阶段，测试人员可能会执行(????????)类型的测试?","options":[{"key":"A","text":"功能测试"},{"key":"B","text":"性能测试"},{"key":"C","text":"安全测试"},{"key":"D","text":"兼容性测试"},{"key":"E","text":"负载测试"}],"answer":"ABCDE","type":"multiple","explanation":"测试实施可包括功能、性能、安全、兼容性和负载等多种测试类型。"},{"id":258,"question":"软件测试员在与客户沟通时，应尽可能隐瞒软件中的潜在问题，以维持良好的客户关系。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"测试员应诚实报告问题，隐瞒缺陷违背职业道德并增加项目风险。"},{"id":259,"question":"计算机网络中的路由器是用来连接不同网络的设备。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"路由器工作在网络层，用于连接不同网络并实现数据包转发。"},{"id":260,"question":"验收测试通常由客户或最终用户执行。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"验收测试由客户或最终用户执行，确认软件满足业务需求。"},{"id":261,"question":"二进制数1101转换为十进制数是13。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"1101B = 1×2³ + 1×2² + 0×2¹ + 1×2⁰ = 8+4+0+1 = 13。"},{"id":262,"question":"探索性测试是一种没有计划、随意进行的测试方法。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"探索性测试是有目标、有策略的测试，并非完全随意进行。"},{"id":263,"question":"测试人员在准备测试用例时应该考虑使用等价类划分方法。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"等价类划分是黑盒测试的核心方法，可有效减少用例数量。"},{"id":264,"question":"性能测试只能在特定的时间段内进行，不能在系统上线后进行。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"性能测试可在上线后进行，如生产环境压测和性能监控。"},{"id":265,"question":"SQL语言只能用于数据库查询，不能用于更新或删除数据。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"SQL语言包括DQL、DML、DDL和DCL，可查询、插入、更新和删除数据。"},{"id":266,"question":"接口测试可以完全替代单元测试和集成测试。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"接口测试、单元测试和集成测试各有侧重，不能相互替代。"},{"id":267,"question":"性能测试的结果应该定期监控和分析，以便及时发现和解决性能问题。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"性能测试结果应持续监控分析，及时发现并解决潜在性能问题。"},{"id":268,"question":"在进行软件测试时，发现一个严重的安全漏洞，正确的做法是(????????)。","options":[{"key":"A","text":"立即报告给上级和相关部门"},{"key":"B","text":"私下告知开发人员并等待其修复"},{"key":"C","text":"忽略该漏洞，认为与自己无关"},{"key":"D","text":"利用该漏洞进行个人测试"}],"answer":"A","type":"single","explanation":"发现严重安全漏洞应立即上报，不能隐瞒、忽略或私自利用。"},{"id":269,"question":"当软件测试员发现测试数据涉及用户隐私时，正确处理方式是(????????)","options":[{"key":"A","text":"随意查看并分享给他人"},{"key":"B","text":"严格遵守隐私保护政策，确保数据安全"},{"key":"C","text":"仅在自己需要时查看隐私数据"},{"key":"D","text":"将隐私数据用于个人研究"}],"answer":"B","type":"single","explanation":"涉及用户隐私的数据必须严格遵守隐私保护政策，确保安全合规。"},{"id":270,"question":"一个软件系统的生存周期包含可行性分析和项目开发计划、需求分析、设计(概要设计和详细设计)、编码、测试和维护等活动，其中(????????)是软件工程的技术核心,其任务是确定如何实现软件系统。","options":[{"key":"A","text":"可行性分析和项目开发计划"},{"key":"B","text":"需求分析"},{"key":"C","text":"设计"},{"key":"D","text":"编码"}],"answer":"C","type":"single","explanation":"设计阶段确定软件结构、模块划分和接口方案，是技术实现的核心。"},{"id":271,"question":"程序中常采用变量表示数据，变量具有名、地址、值、作用域、生存期等属性。关于变量的叙述，(????????)是错误的。","options":[{"key":"A","text":"根据作用域规则，在函数中定义的变量只能在函数中引用"},{"key":"B","text":"在函数中定义的变量，其生存期为整个程序执行期间"},{"key":"C","text":"在函数中定义的变量不能与其所在函数的形参同名"},{"key":"D","text":"在函数中定义的变量，其存储单元在内存的栈区"}],"answer":"B","type":"single","explanation":"函数内局部变量生存期为函数执行期间，退出即释放。"},{"id":272,"question":"下列叙述中，正确的是(????????)。","options":[{"key":"A","text":"CPU能直接读取硬盘上的数据"},{"key":"B","text":"CPU能直接存取内存储器"},{"key":"C","text":"CPU由存储器、运算器和控制器组成"},{"key":"D","text":"CPU主要用来存储程序和数据"}],"answer":"B","type":"single","explanation":"CPU直接存取内存；硬盘数据需先调入内存才能被CPU处理。"},{"id":273,"question":"一台微机性能的好坏，主要取决于(????????)。","options":[{"key":"A","text":"内存储器的容量大小"},{"key":"B","text":"CPU的性能"},{"key":"C","text":"显示器的分辨率高低"},{"key":"D","text":"硬盘的容量"}],"answer":"B","type":"single","explanation":"微机性能主要取决于CPU性能，包括主频、核心数和架构。"},{"id":274,"question":"组成计算机指令的两部分是(????????)。","options":[{"key":"A","text":"数据和字符"},{"key":"B","text":"操作码和地址码"},{"key":"C","text":"运算符和运算数"},{"key":"D","text":"运算符和运算结果"}],"answer":"B","type":"single","explanation":"计算机指令由操作码（操作类型）和地址码（操作数位置）组成。"},{"id":275,"question":"对“功能测试的回归测试经常要多次重复”的正确理解是(????????)。","options":[{"key":"A","text":"回归测试应该执行初测时所用的全部测试用例"},{"key":"B","text":"回归测试只要执行发现缺陷的那些测试用例即可"},{"key":"C","text":"通过多次的回归测试可以发现所有缺陷"},{"key":"D","text":"回归测试就是验收测试"}],"answer":"A","type":"single","explanation":"回归测试通常需执行初测时的全部用例，确保修改未引入新问题。"},{"id":276,"question":"计算机感染特洛伊木马后的典型现象是(????????)。","options":[{"key":"A","text":"程序异常退出"},{"key":"B","text":"有未知程序试图建立网络连接"},{"key":"C","text":"邮箱被垃圾邮件填满"},{"key":"D","text":"Windows 系统黑屏"}],"answer":"B","type":"single","explanation":"特洛伊木马的典型特征是有未知程序试图与外部建立网络连接。"},{"id":277,"question":"以下关于测试计划的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"测试计划能使测试工作顺利进行"},{"key":"B","text":"测试计划能使项目参与人员沟通顺畅"},{"key":"C","text":"测试计划无益于提高软件质量"},{"key":"D","text":"测试计划是软件过程规范化的要求"}],"answer":"C","type":"single","explanation":"测试计划有助于规范测试过程、促进沟通并提高软件质量。"},{"id":278,"question":"软件测试的对象包括(????????)。","options":[{"key":"A","text":"①②③④⑤⑥"},{"key":"B","text":"①②③④⑤"},{"key":"C","text":"①②④"},{"key":"D","text":"①②③④"}],"answer":"B","type":"single","explanation":"软件测试对象包括需求、设计、代码、测试报告和用户手册等文档及代码。"},{"id":279,"question":"软件可移植性应从如下(????????)方面进行测试。","options":[{"key":"A","text":"适应性、易安装性、共存性、易替换性"},{"key":"B","text":"适应性、易安装性、可伸缩性、易替换性"},{"key":"C","text":"适应性、易安装性、兼容性、易替换性"},{"key":"D","text":"适应性、成熟性、兼容性、易替换性"}],"answer":"A","type":"single","explanation":"可移植性测试包括适应性、易安装性、共存性和易替换性。"},{"id":280,"question":"在计算机中，每个存储单元都有一个连续的编号，此编号称为(????????)。","options":[{"key":"A","text":"地址"},{"key":"B","text":"位置号"},{"key":"C","text":"门牌号"},{"key":"D","text":"房号"}],"answer":"A","type":"single","explanation":"内存中每个存储单元都有唯一地址，CPU通过地址访问数据。"},{"id":281,"question":"用来存储当前正在运行的应用程序的存储器是(????????)。","options":[{"key":"A","text":"内存"},{"key":"B","text":"硬盘"},{"key":"C","text":"软盘"},{"key":"D","text":"CD-ROM"}],"answer":"A","type":"single","explanation":"内存用于存储当前正在运行的程序和数据，供CPU直接访问。"},{"id":282,"question":"以下关于软件测试原则叙述中，不正确是的(????????)。","options":[{"key":"A","text":"测试阶段在实现阶段之后，因此实现完成后再开始进行测试"},{"key":"B","text":"测试用例需要完善和修订"},{"key":"C","text":"发现错误越多的地方应该进行更多的测试"},{"key":"D","text":"测试用例本身也需要测试"}],"answer":"A","type":"single","explanation":"测试应尽早介入，实现完成后才测试会增加修复成本和风险。"},{"id":283,"question":"下列度量单位中，用来度量计算机内存空间大小的是(????????)。","options":[{"key":"A","text":"MB/s"},{"key":"B","text":"MIPS"},{"key":"C","text":"GHz"},{"key":"D","text":"MB"}],"answer":"D","type":"single","explanation":"MB是度量存储空间大小的单位；MB/s是带宽，MIPS是速度，GHz是频率。"},{"id":284,"question":"下列叙述中，错误的是(????????)。","options":[{"key":"A","text":"硬盘在主机箱内，它是主机的组成部分"},{"key":"B","text":"硬盘是外部存储器之一"},{"key":"C","text":"硬盘的技术指标之一是每分钟的转速rpm"},{"key":"D","text":"硬盘与CPU之间不能直接交换数据"}],"answer":"A","type":"single","explanation":"硬盘是外部存储器，不属于主机内部组件；主机包括CPU和内存。"},{"id":285,"question":"下列关于磁道的说法中，正确的是(????????)。","options":[{"key":"A","text":"盘面上的磁道是一组同心圆"},{"key":"B","text":"由于每一磁道的周长不同，所以每一磁道的存储容量也不同"},{"key":"C","text":"盘面上的磁道是一条阿基米德螺线"},{"key":"D","text":"磁道的编号是最内圈为0，并次序由内向外逐渐增大，最外圈的编号最大"}],"answer":"A","type":"single","explanation":"磁盘磁道是一组同心圆，各磁道存储容量相同，编号从外向内或从内向外。"},{"id":286,"question":"(????????)不属于测试人员编写的文档。","options":[{"key":"A","text":"缺陷报告"},{"key":"B","text":"测试环境配置文档"},{"key":"C","text":"缺陷修复报告"},{"key":"D","text":"测试用例说明文档"}],"answer":"C","type":"single","explanation":"缺陷修复报告由开发人员编写，测试人员编写缺陷报告、用例和环境文档。"},{"id":287,"question":"验证某音乐会订票系统是否能够承受大量用户同时访问，测试工程师一般采用(????????)测试工具。","options":[{"key":"A","text":"故障诊断"},{"key":"B","text":"代码"},{"key":"C","text":"负载压力"},{"key":"D","text":"网络仿真"}],"answer":"C","type":"single","explanation":"大量用户同时访问场景应使用负载压力测试工具模拟高并发。"},{"id":288,"question":"如果在程序中的多个地方需要使用同一个常数，那么最好将其定义为一个符号常量，这样(????????)。","options":[{"key":"A","text":"可以缩短程序代码的长度"},{"key":"B","text":"便于进行编译过程的优化"},{"key":"C","text":"可以加快程序的运行速度"},{"key":"D","text":"便于修改此常数并提高可读性"}],"answer":"D","type":"single","explanation":"符号常量便于统一修改数值并提高代码可读性和可维护性。"},{"id":289,"question":"检测系统在长时间运行下是否存在性能瓶颈，应进行(????????)。","options":[{"key":"A","text":"负载测试"},{"key":"B","text":"压力测试"},{"key":"C","text":"疲劳强度测试"},{"key":"D","text":"大数据量测试"}],"answer":"C","type":"single","explanation":"疲劳强度测试（稳定性测试）通过长时间运行检测系统是否存在性能瓶颈。"},{"id":290,"question":"若程序在运行时陷入死循环，则该情况属于(????????)。","options":[{"key":"A","text":"语法错误"},{"key":"B","text":"运行时异常"},{"key":"C","text":"动态的语义错误"},{"key":"D","text":"静态的语义错误"}],"answer":"C","type":"single","explanation":"死循环属于运行时的语义错误，语法正确但逻辑导致无法终止。"},{"id":291,"question":"测试过程中，正确的测试顺序应该是(????????)。\n①单元测试 ②集成测试 ③系统测试","options":[{"key":"A","text":"①②③"},{"key":"B","text":"③①②"},{"key":"C","text":"②③①"},{"key":"D","text":"③②①"}],"answer":"A","type":"single","explanation":"正常测试顺序为单元测试→集成测试→系统测试，由小到大逐级验证。"},{"id":292,"question":"Java 虚拟机采用(????????)软件体系结构。","options":[{"key":"A","text":"管道一过滤器"},{"key":"B","text":"分层"},{"key":"C","text":"黑板"},{"key":"D","text":"解释器"}],"answer":"D","type":"single","explanation":"Java虚拟机通过解释器将字节码转换为机器码并执行。"},{"id":293,"question":"现要开发一个通过卫星通信连接计算机的新软件产品，假设之前没有开发卫星通信软件的经验，则最不适合采用(????????)模型。","options":[{"key":"A","text":"瀑布"},{"key":"B","text":"原型"},{"key":"C","text":"增量"},{"key":"D","text":"螺旋"}],"answer":"A","type":"single","explanation":"无经验的新领域项目需求不明确，瀑布模型因缺乏反馈而最不适合。"},{"id":294,"question":"某软件系统的原始需求包括，“当某个査询请求是不适当或非法的，应提示用户”，该需求属于(????????)。","options":[{"key":"A","text":"功能需求"},{"key":"B","text":"质量需求"},{"key":"C","text":"设计约束"},{"key":"D","text":"过程约束"}],"answer":"A","type":"single","explanation":"系统对非法请求给出提示属于功能需求，描述了系统应完成的具体行为。原答案错误，已修正为A。"},{"id":295,"question":"给系统增加特征越容易，说明软件的(????????)越好。","options":[{"key":"A","text":"功能性"},{"key":"B","text":"可靠性"},{"key":"C","text":"可维护性"},{"key":"D","text":"易使用性"}],"answer":"C","type":"single","explanation":"易增加特征表明软件可维护性好，结构清晰、扩展方便。"},{"id":296,"question":"软件工程每一个阶段结束前，应该着重对可维护性进行复审。在系统设计阶段的复审期间，应该从(????????)出发，评价软件的结构和过程。","options":[{"key":"A","text":"指出可移植性问题以及可能影响软件维护的系统界面"},{"key":"B","text":"容易修改、模块化和功能独立的目的"},{"key":"C","text":"强调编码风格和内部说明文档"},{"key":"D","text":"可测试性"}],"answer":"B","type":"single","explanation":"设计阶段复审应从容易修改、模块化和功能独立的目标评价结构与过程。"},{"id":297,"question":"(????????)不属于使用软件测试工具的目的。","options":[{"key":"A","text":"帮助测试寻找问题"},{"key":"B","text":"协助问题的诊断"},{"key":"C","text":"节省测试时间"},{"key":"D","text":"替代手工测试"}],"answer":"D","type":"single","explanation":"测试工具用于辅助测试，不能完全替代手工测试和人的判断。"},{"id":298,"question":"下列几种存储器，存取周期最短的是(????????)。","options":[{"key":"A","text":"内存储器"},{"key":"B","text":"光盘存储器"},{"key":"C","text":"硬盘存储器"},{"key":"D","text":"软盘存储器"}],"answer":"A","type":"single","explanation":"内存采用半导体存储技术，存取周期远短于磁盘和光盘。"},{"id":299,"question":"在外部设备中，扫描仪属于(????????)。","options":[{"key":"A","text":"输出设备"},{"key":"B","text":"存储设备"},{"key":"C","text":"输入设备"},{"key":"D","text":"特殊设备"}],"answer":"C","type":"single","explanation":"扫描仪将纸质文档转换为数字信号输入计算机，属于输入设备。"},{"id":300,"question":"软件测试的对象包括(????????)。\n①软件代码\n②文档\n③数据","options":[{"key":"A","text":"①②"},{"key":"B","text":"①③"},{"key":"C","text":"②③"},{"key":"D","text":"①②③"}],"answer":"D","type":"single","explanation":"软件测试对象包括代码、文档和数据三个方面。"},{"id":301,"question":"软件测试的目的是(????????)。","options":[{"key":"A","text":"避免软件开发中出现的错误"},{"key":"B","text":"发现软件中出现的错误"},{"key":"C","text":"容忍软件中出现的错误"},{"key":"D","text":"修改软件中出现的错误"}],"answer":"B","type":"single","explanation":"软件测试的核心目的是发现软件中存在的缺陷和错误，而非避免、容忍或修改错误。"},{"id":302,"question":"当前流行的移动硬盘或U盘进行读/写利用的计算机接口是(????????)。","options":[{"key":"A","text":"串行接口"},{"key":"B","text":"平行接口"},{"key":"C","text":"USB"},{"key":"D","text":"UBS"}],"answer":"C","type":"single","explanation":"当前移动硬盘和U盘普遍采用USB接口进行数据读写。"},{"id":303,"question":"测试系统在何种服务级别下会崩溃，应进行(????????)。","options":[{"key":"A","text":"负载测试"},{"key":"B","text":"压力测试"},{"key":"C","text":"大数据量测试"},{"key":"D","text":"疲劳测试"}],"answer":"B","type":"single","explanation":"压力测试通过施加极限负载，确定系统在何种服务级别下会崩溃或失效。"},{"id":304,"question":"对于防病毒系统的测试是系统安全测试的重要内容，下列不属于防病毒系统安全测试基本测试点的是(????????)。","options":[{"key":"A","text":"能否提供对病毒特征与检测引擎的定期在线更新服务"},{"key":"B","text":"能否在不更新特征库的前提下对新的未知病毒进行有效查杀"},{"key":"C","text":"能否支持多种平台的病毒防范"},{"key":"D","text":"能否支持对电子邮件附件的病毒防治"}],"answer":"B","type":"single","explanation":"防病毒系统测试不包括要求不更新特征库即可查杀未知病毒，这超出了传统特征检测的能力范围。"},{"id":305,"question":"系统功能测试过程中，验证需求可以正确实现的测试用例称为(????????)。","options":[{"key":"A","text":"业务流程测试用例"},{"key":"B","text":"功能点测试用例"},{"key":"C","text":"通过测试用例"},{"key":"D","text":"失败测试用例"}],"answer":"C","type":"single","explanation":"通过测试用例验证需求可正确实现，确认功能符合预期；失败用例则验证异常处理。"},{"id":306,"question":"在软件测试结果分析中，如果发现某个模块的错误率较高，正确的做法是(????????)。","options":[{"key":"A","text":"忽略该错误"},{"key":"B","text":"立即修复所有错误"},{"key":"C","text":"对该模块进行详细的代码审查"},{"key":"D","text":"停止测试工作"}],"answer":"C","type":"single","explanation":"错误率较高的模块应重点进行代码审查，找出设计或实现层面的系统性问题。"},{"id":307,"question":"以下关于软件缺陷的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"需要对软件缺陷划分严重性，但不需要划分处理优先级"},{"key":"B","text":"需要进行软件错误跟踪管理"},{"key":"C","text":"每次对软件错误的处理都要保留处理信息"},{"key":"D","text":"错误修复后必须经过验证"}],"answer":"A","type":"single","explanation":"缺陷管理需同时划分严重性和优先级，确保关键问题得到及时处理。"},{"id":308,"question":"针对电子政务类应用系统的功能测试，为设计有效的测试用例，应(????????)。","options":[{"key":"A","text":"使业务需求的覆盖率达到 100%"},{"key":"B","text":"利用等价类法模拟核心业务流程的正确执行"},{"key":"C","text":"对一个业务流程的测试用例设计一条验证数据"},{"key":"D","text":"经常使用边界值法验证界面输入值"}],"answer":"D","type":"single","explanation":"电子政务系统有大量表单输入，边界值法能有效验证输入域的边界处理。"},{"id":309,"question":"测试结果分析中，(????????)方法有助于确定软件的可靠性和稳定性?","options":[{"key":"A","text":"只查看新发现的缺陷"},{"key":"B","text":"分析缺陷的分布和趋势"},{"key":"C","text":"只关注严重缺陷"},{"key":"D","text":"忽略已修复的缺陷"}],"answer":"B","type":"single","explanation":"分析缺陷分布和趋势有助于评估软件可靠性和稳定性，识别质量风险。"},{"id":310,"question":"使用自动化测试工具中，(????????)是最难自动化的。","options":[{"key":"A","text":"测试执行"},{"key":"B","text":"实际输出与预期输出的比较"},{"key":"C","text":"测试用例生成"},{"key":"D","text":"测试录制与回放"}],"answer":"C","type":"single","explanation":"测试用例生成需要理解需求和设计，自动化程度最低，最难实现全自动。"},{"id":311,"question":"软件测试的对象不包括(????????)。","options":[{"key":"A","text":"程序"},{"key":"B","text":"需求规格说明书"},{"key":"C","text":"数据库中的数据"},{"key":"D","text":"质量改进措施"}],"answer":"D","type":"single","explanation":"软件测试对象包括程序、文档和数据；质量改进措施是管理活动，非测试对象。"},{"id":312,"question":"在软件测试中，测试环境应该由(????????)来准备?","options":[{"key":"A","text":"开发人员"},{"key":"B","text":"测试人员"},{"key":"C","text":"项目经理"},{"key":"D","text":"客户代表"}],"answer":"B","type":"single","explanation":"测试环境应由测试人员准备，确保环境满足测试需求且可控。"},{"id":313,"question":"回归测试通常在(????????)情况下进行?","options":[{"key":"A","text":"新功能开发完成后"},{"key":"B","text":"缺陷修复后"},{"key":"C","text":"系统升级后"},{"key":"D","text":"项目结束前"}],"answer":"B","type":"single","explanation":"回归测试在缺陷修复后进行，验证修改未引入新问题。"},{"id":314,"question":"在对测试结果进行分析时，以下(????????)不是重要的考虑因素?","options":[{"key":"A","text":"缺陷的数量"},{"key":"B","text":"缺陷的严重程度"},{"key":"C","text":"测试的覆盖范围"},{"key":"D","text":"开发人员的个人喜好"}],"answer":"D","type":"single","explanation":"开发人员个人喜好与测试分析无关，不应作为考虑因素。"},{"id":315,"question":"以下(????????)不是测试执行阶段的主要任务?","options":[{"key":"A","text":"运行测试用例"},{"key":"B","text":"记录测试结果"},{"key":"C","text":"编写测试报告"},{"key":"D","text":"编写测试用例"}],"answer":"D","type":"single","explanation":"编写测试用例属于测试设计阶段任务，不属于测试执行阶段。"},{"id":316,"question":"如果测试结果显示某个功能的响应时间超出了预期，最可能的原因是(????????)。","options":[{"key":"A","text":"测试环境配置错误"},{"key":"B","text":"用户操作不当"},{"key":"C","text":"代码优化不足"},{"key":"D","text":"需求变更"}],"answer":"C","type":"single","explanation":"响应时间超标通常源于代码效率低、算法复杂或未优化，需进行性能调优。"},{"id":317,"question":"在测试过程中，缺陷的跟踪和管理通常由(????????)工具来支持。","options":[{"key":"A","text":"版本控制系统"},{"key":"B","text":"缺陷管理系统"},{"key":"C","text":"测试管理工具"},{"key":"D","text":"项目管理工具"}],"answer":"B","type":"single","explanation":"缺陷跟踪和管理由缺陷管理系统（如JIRA、Bugzilla）支持。"},{"id":318,"question":"在测试执行过程中，发现缺陷后正确的做法是(????????)","options":[{"key":"A","text":"自行修复缺陷"},{"key":"B","text":"报告给开发人员"},{"key":"C","text":"忽略该缺陷"},{"key":"D","text":"等待项目结束后再处理"}],"answer":"B","type":"single","explanation":"发现缺陷应报告给开发人员，不能自行修复或忽略。"},{"id":319,"question":"测试数据的准备应遵循(????????)原则。","options":[{"key":"A","text":"真实性"},{"key":"B","text":"随意性"},{"key":"C","text":"冗余性"},{"key":"D","text":"复杂性"}],"answer":"A","type":"single","explanation":"测试数据应真实反映业务场景，确保测试结果的有效性。"},{"id":320,"question":"在HTTP接口测试中，(????????)状态码表示请求成功。","options":[{"key":"A","text":"200"},{"key":"B","text":"400"},{"key":"C","text":"404"},{"key":"D","text":"500"}],"answer":"A","type":"single","explanation":"HTTP状态码200表示请求已成功处理并返回响应。"},{"id":321,"question":"以下(????????)状态码表示客户端请求有语法错误或无法完成请求。","options":[{"key":"A","text":"200"},{"key":"B","text":"400"},{"key":"C","text":"404"},{"key":"D","text":"500"}],"answer":"B","type":"single","explanation":"HTTP状态码400表示请求语法错误或参数无效，服务器无法理解。"},{"id":322,"question":"在测试执行阶段，测试人员应用以下(????????)方式记录测试结果。","options":[{"key":"A","text":"口头汇报"},{"key":"B","text":"记录在便签纸上"},{"key":"C","text":"使用测试管理工具"},{"key":"D","text":"发送给项目经理"}],"answer":"C","type":"single","explanation":"使用测试管理工具记录结果，保证数据完整、可追溯和易于分析。"},{"id":323,"question":"在测试实施过程中，(????????)阶段通常不涉及测试脚本的编写。","options":[{"key":"A","text":"测试计划"},{"key":"B","text":"测试设计"},{"key":"C","text":"测试准备"},{"key":"D","text":"测试执行"}],"answer":"A","type":"single","explanation":"测试计划阶段确定范围和目标，不涉及具体的脚本编写。"},{"id":324,"question":"在测试执行阶段，测试人员应(????????)处理无法重现的缺陷。","options":[{"key":"A","text":"忽略该缺陷"},{"key":"B","text":"立即修复该缺陷"},{"key":"C","text":"深入调查并尝试重现"},{"key":"D","text":"报告给项目经理"}],"answer":"D","type":"single","explanation":"无法重现的缺陷应上报项目经理，协调资源进一步调查或决策。"},{"id":325,"question":"在测试执行阶段，以下(????????)做法是不推荐的。","options":[{"key":"A","text":"严格按照测试用例执行测试"},{"key":"B","text":"随意跳过一些看似不重要的测试用例"},{"key":"C","text":"详细记录测试结果和发现的问题"},{"key":"D","text":"对发现的问题进行复现和确认"}],"answer":"B","type":"single","explanation":"测试执行应严格按用例进行，随意跳过会破坏测试完整性和客观性。"},{"id":326,"question":"在软件测试实施中，测试团队与开发团队之间的沟通通常通过(????????)方式进行。","options":[{"key":"A","text":"电子邮件"},{"key":"B","text":"电话"},{"key":"C","text":"会议"},{"key":"D","text":"以上都是"}],"answer":"D","type":"single","explanation":"测试与开发可通过邮件、电话、会议等多种方式沟通协作。"},{"id":327,"question":"在测试实施过程中，以下(????????)环节与测试质量直接相关。","options":[{"key":"A","text":"测试计划的制定"},{"key":"B","text":"测试用例的设计"},{"key":"C","text":"测试环境的搭建"},{"key":"D","text":"所有上述环节"}],"answer":"D","type":"single","explanation":"测试计划、用例设计和环境搭建都与测试质量直接相关，缺一不可。"},{"id":328,"question":"在分析测试结果时，发现某个功能的失败率持续较高，以下(????????)措施最为有效。","options":[{"key":"A","text":"增加对该功能的测试次数"},{"key":"B","text":"忽略该功能的测试结果"},{"key":"C","text":"对该功能进行重构或优化"},{"key":"D","text":"减少对该功能的测试范围"}],"answer":"C","type":"single","explanation":"失败率持续高说明模块存在系统性问题，应进行重构或优化。"},{"id":329,"question":"在测试执行阶段，测试人员确保测试准确性的做法是(????????)","options":[{"key":"A","text":"只执行简单的测试用例"},{"key":"B","text":"依赖开发人员的意见"},{"key":"C","text":"严格按照测试计划和测试用例执行"},{"key":"D","text":"随意修改测试用例以适应实际情况"}],"answer":"C","type":"single","explanation":"严格按计划执行可确保测试的一致性和准确性。"},{"id":330,"question":"以下不属于文档测试测试范围的是(????????)。","options":[{"key":"A","text":"软件开发计划"},{"key":"B","text":"数据库脚本"},{"key":"C","text":"测试分析报告"},{"key":"D","text":"用户手册"}],"answer":"B","type":"single","explanation":"数据库脚本是开发和部署产物，不属于文档测试范围。"},{"id":331,"question":"在测试执行阶段，以下(????????)做法有助于提高测试的准确性。","options":[{"key":"A","text":"只执行部分关键的测试用例"},{"key":"B","text":"随意调整测试用例的顺序"},{"key":"C","text":"严格按照测试用例和计划执行"},{"key":"D","text":"跳过看似复杂的测试用例"}],"answer":"C","type":"single","explanation":"严格按用例和计划执行是提高测试准确性的基本保障。"},{"id":332,"question":"在测试实施过程中，测试人员与开发人员之间的协作对于(????????)至关重要。","options":[{"key":"A","text":"测试进度"},{"key":"B","text":"缺陷修复"},{"key":"C","text":"测试质量"},{"key":"D","text":"所有上述内容"}],"answer":"D","type":"single","explanation":"测试与开发的协作对进度、缺陷修复和质量都至关重要。"},{"id":333,"question":"软件风险一般包含(????????)两个特性。","options":[{"key":"A","text":"救火和危机管理"},{"key":"B","text":"已知风险和未知风险"},{"key":"C","text":"不确定性和损失"},{"key":"D","text":"员工和预算"}],"answer":"C","type":"single","explanation":"软件风险的本质是不确定性导致潜在损失。"},{"id":334,"question":"软件测试员在职业道德方面平衡个人利益和公司利益的方式是(????????)","options":[{"key":"A","text":"以个人利益为重，忽略公司利益"},{"key":"B","text":"以公司利益为重，遵守公司规定"},{"key":"C","text":"灵活处理个人利益和公司利益的关系"},{"key":"D","text":"完全听从上级指示，不考虑个人利益"},{"key":"E","text":"个人利益和公司利益冲冲突时，优先个人利益"}],"answer":"BC","type":"multiple","explanation":"测试员应遵守公司规定，同时灵活平衡个人与公司的利益关系。"},{"id":335,"question":"兼容性测试的测试范围包括(????????)。","options":[{"key":"A","text":"硬件兼容性测试"},{"key":"B","text":"软件兼容性测试"},{"key":"C","text":"数据兼容性测试"},{"key":"D","text":"平台兼容性测试"},{"key":"E","text":"操作人员兼容性测试"}],"answer":"ABCD","type":"multiple","explanation":"兼容性测试包括硬件、软件、数据和平台兼容性，操作人员不属于技术范畴。"},{"id":336,"question":"在设计测试用例时，测试人员需要关注的要点是(????????)。","options":[{"key":"A","text":"输入数据的有效性"},{"key":"B","text":"预期的输出结果"},{"key":"C","text":"测试的执行步骤"},{"key":"D","text":"软件的界面设计"},{"key":"E","text":"测试人员的分工"}],"answer":"ABC","type":"multiple","explanation":"设计用例需关注有效输入、预期输出和执行步骤，界面设计非用例要素。"},{"id":337,"question":"在软件测试实施过程中，测试团队可能使用测试技术是(????????)。","options":[{"key":"A","text":"单元测试"},{"key":"B","text":"集成测试"},{"key":"C","text":"功能测试"},{"key":"D","text":"代码审查"},{"key":"E","text":"性能测试"}],"answer":"ABCDE","type":"multiple","explanation":"测试实施中可能综合使用单元、集成、功能、代码审查和性能等技术。"},{"id":338,"question":"测试人员在记录测试结果时，需要包括的信息是(????????)。","options":[{"key":"A","text":"测试用例的编号"},{"key":"B","text":"测试执行的时间"},{"key":"C","text":"测试结果的状态"},{"key":"D","text":"缺陷的详细描述"},{"key":"E","text":"缺陷的修复状态"}],"answer":"ABCD","type":"multiple","explanation":"测试结果记录应包括用例编号、执行时间、结果状态和缺陷描述。"},{"id":339,"question":"在分析测试结果时，测试人员通常需要关注的缺陷类型是(????????)。","options":[{"key":"A","text":"功能缺陷"},{"key":"B","text":"性能缺陷"},{"key":"C","text":"安全的缺陷"},{"key":"D","text":"界面缺陷"},{"key":"E","text":"兼容性缺陷"}],"answer":"ABCDE","type":"multiple","explanation":"缺陷类型包括功能、性能、安全、界面和兼容性等方面。"},{"id":340,"question":"软件测试结果分析对于后续的开发和测试工作的指导意义是(????????)。","options":[{"key":"A","text":"确定测试的重点区域"},{"key":"B","text":"调整测试策略"},{"key":"C","text":"预测未来可能出现的问题"},{"key":"D","text":"评估项目的整体进度"},{"key":"E","text":"确定软件发布日期，保证按时交付"}],"answer":"ABC","type":"multiple","explanation":"结果分析可指导测试重点、调整策略和预测风险，但不能直接决定发布日期。"},{"id":341,"question":"测试结果分析中的趋势分析可能涉及的方面是(????????)。","options":[{"key":"A","text":"缺陷数量的变化趋势"},{"key":"B","text":"测试覆盖率的提升情况"},{"key":"C","text":"测试用例的执行效率"},{"key":"D","text":"软件性能的提升"},{"key":"E","text":"用户界面设计的审美评估"}],"answer":"ABCD","type":"multiple","explanation":"趋势分析关注缺陷数量、覆盖率提升、执行效率和性能变化等维度。"},{"id":342,"question":"在进行软件测试结果分析时，以下(????????)方法可以帮助识别测试中的不足。","options":[{"key":"A","text":"对比不同版本的测试结果"},{"key":"B","text":"分析测试用例的覆盖情况"},{"key":"C","text":"听取开发人员的意见"},{"key":"D","text":"评估测试环境的稳定性"},{"key":"E","text":"用户满意度调查"}],"answer":"ABD","type":"multiple","explanation":"对比版本结果、分析覆盖率和评估环境稳定性有助于识别测试不足。"},{"id":343,"question":"准备测试环境时，测试人员需要考虑的因素是(????????)。","options":[{"key":"A","text":"硬件配置"},{"key":"B","text":"操作系统版本"},{"key":"C","text":"网络条件"},{"key":"D","text":"开发人员的工作习惯"},{"key":"E","text":"测试人员的个人喜好"}],"answer":"ABC","type":"multiple","explanation":"测试环境需考虑硬件配置、操作系统版本和网络条件等技术因素。"},{"id":344,"question":"软件测试员在测试过程中发现软件存在性能问题，但认为该问题不会影响用户使用，因此选择不报告。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"测试员应客观报告所有发现的问题，不能因个人判断而隐瞒。"},{"id":345,"question":"根据输入输出等价类边界上的取值来设计用例的黑盒测试方法是边界值分析法。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"边界值分析法基于等价类边界取值设计用例，有效发现边界错误。"},{"id":346,"question":"查询结果正确性不属于负载压力测试的测试指标。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"负载压力测试关注响应时间和吞吐量等性能指标，不验证查询结果正确性。"},{"id":347,"question":"确认测试一般由开发方进行。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"确认测试通常由用户或客户执行，验证软件是否满足需求。"},{"id":348,"question":"黑盒测试也叫做结构测试，针对代码本身进行测试。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"黑盒测试基于功能需求，不关注代码内部结构；结构测试属于白盒测试。"},{"id":349,"question":"数据库是按照一定的数据模型组织、存储和应用的数据的集合。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"数据库是按数据模型组织、存储和管理的数据集合。"},{"id":350,"question":"由干操作系统升级而对软件进行修改的行为属于适应性维护。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"为适应操作系统升级而修改软件属于适应性维护。"},{"id":351,"question":"软件测试员可以随意使用未经授权的测试数据和软件，以完成测试任务。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"测试员必须遵守版权和数据授权规定，不能随意使用未经授权的资源。"},{"id":352,"question":"性能测试主要关注输出结果是否正确。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"性能测试关注响应时间、吞吐量和资源利用率，不验证功能正确性。"},{"id":353,"question":"确认测试需要验证软件的功能和性能是否与用户要求一致。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"确认测试验证软件功能和性能是否与用户要求一致。"},{"id":354,"question":"42.系统功能测试过程中，验证需求可以正确实现的测试用例称为(? )。","options":[{"key":"A","text":"业务流程测试用例"},{"key":"B","text":"功能点测试用例"},{"key":"C","text":"通过测试用例"},{"key":"D","text":"失败测试用例"}],"answer":"C","type":"single","explanation":"通过测试用例验证需求可正确实现，确认功能符合预期。"},{"id":355,"question":"在测试过程中，软件测试员发现同事违反了测试规范，正确的做法是(????????)","options":[{"key":"A","text":"直接告诉同事并帮助其改正"},{"key":"B","text":"忽视该问题，认为与自己无关"},{"key":"C","text":"向上级报告并等待上级处理"},{"key":"D","text":"私下与同事讨论，不公开提及"}],"answer":"A","type":"single","explanation":"发现同事违规应及时提醒并帮助改正，促进团队规范执行。"},{"id":356,"question":"当软件测试员面临时间和质量的冲突时，正确的做法是(????????)。","options":[{"key":"A","text":"优先考虑时间，牺牲测试质量"},{"key":"B","text":"坚守测试标准，确保质量不受损"},{"key":"C","text":"随意调整测试范围以满足时间要求"},{"key":"D","text":"放弃测试，直接交付产品"}],"answer":"B","type":"single","explanation":"测试应坚守质量标准，不能因时间压力随意牺牲质量。"},{"id":357,"question":"下列叙述中，正确的是(????????)。","options":[{"key":"A","text":"内存中存放的是当前正在执行的程序和所需的数据"},{"key":"B","text":"内存中存放的是当前暂时不用的程序和数据"},{"key":"C","text":"外存中存放的是当前正在执行的程序和所需的数据"},{"key":"D","text":"内存中只能存放指令"}],"answer":"A","type":"single","explanation":"内存存放当前正在执行的程序和数据，供CPU直接访问。"},{"id":358,"question":"能直接与CPU交换信息的存储器是(????????)。","options":[{"key":"A","text":"硬盘存储器"},{"key":"B","text":"CD-ROM"},{"key":"C","text":"内存储器"},{"key":"D","text":"软盘存储器"}],"answer":"C","type":"single","explanation":"内存储器可直接与CPU交换信息；外存数据需先调入内存。"},{"id":359,"question":"下列叙述中，正确的是(????????)。","options":[{"key":"A","text":"字长为16位表示这台计算机最大能计算一个l6位的十进制数"},{"key":"B","text":"字长为16位表示这台计算机的CPU一次能处理l6位二进制数"},{"key":"C","text":"运算器只能进行算术运算"},{"key":"D","text":"SRAM的集成度高于DRAM"}],"answer":"B","type":"single","explanation":"字长表示CPU一次能处理的二进制位数；16位即一次处理16位二进制。"},{"id":360,"question":"下列叙述中，错误的是(????????)。","options":[{"key":"A","text":"内存储器一般由ROM和RAM组成"},{"key":"B","text":"RAM中存储的数据一旦断电就全部丢失"},{"key":"C","text":"CPU可以直接存取硬盘中的数据"},{"key":"D","text":"存储在ROM中的数据断电后也不会丢失"}],"answer":"C","type":"single","explanation":"CPU不能直接存取硬盘数据，需通过内存中转；硬盘属于外存。"},{"id":361,"question":"把存储在硬盘上的程序传送到指定的内存区域中，这种操作称为(????????)。","options":[{"key":"A","text":"输出"},{"key":"B","text":"写盘"},{"key":"C","text":"输入"},{"key":"D","text":"读盘"}],"answer":"D","type":"single","explanation":"将硬盘程序传送到内存的操作称为读盘（磁盘读取）。"},{"id":362,"question":"在接口测试中，(????????)状态码表示服务器内部错误，无法完成请求。","options":[{"key":"A","text":"200"},{"key":"B","text":"400"},{"key":"C","text":"404"},{"key":"D","text":"500"}],"answer":"D","type":"single","explanation":"HTTP状态码500表示服务器内部错误，无法完成请求。"},{"id":363,"question":"软件需求规格说明书的内容不包括(????????)。","options":[{"key":"A","text":"软件功能需求"},{"key":"B","text":"软件非功能需求"},{"key":"C","text":"设计约束"},{"key":"D","text":"接口设计"}],"answer":"D","type":"single","explanation":"需求规格说明书包括功能、非功能需求和设计约束；接口设计属于设计文档。"},{"id":364,"question":"以下不属于在需求分析阶段编写的文档是(????????)。","options":[{"key":"A","text":"软件需求规格说明书"},{"key":"B","text":"概要设计文档"},{"key":"C","text":"测试计划"},{"key":"D","text":"用户手册"}],"answer":"B","type":"single","explanation":"概要设计文档属于设计阶段，不属于需求分析阶段产物。"},{"id":365,"question":"在软件测试实施过程中，以下(????????)活动通常在测试计划阶段进行。","options":[{"key":"A","text":"编写测试用例"},{"key":"B","text":"执行测试用例"},{"key":"C","text":"编写测试总结报告"},{"key":"D","text":"确定测试范围和目标"}],"answer":"D","type":"single","explanation":"确定测试范围和目标是测试计划阶段的核心任务。"},{"id":366,"question":"以下属于安全测试方法的是(????????)。\n①安全功能验证②安全漏洞扫描\n③模拟攻击实验④数据侦听","options":[{"key":"A","text":"①③"},{"key":"B","text":"①②③"},{"key":"C","text":"①②④"},{"key":"D","text":"①②③④"}],"answer":"D","type":"single","explanation":"安全测试方法包括功能验证、漏洞扫描、模拟攻击和数据侦听。"},{"id":367,"question":"硬盘属于(????????)。","options":[{"key":"A","text":"内部存储器"},{"key":"B","text":"外部存储器"},{"key":"C","text":"只读存储器"},{"key":"D","text":"输出设备"}],"answer":"B","type":"single","explanation":"硬盘属于外部存储器，容量大但速度较内存慢。"},{"id":368,"question":"软件工程的基本目标是(????????)。","options":[{"key":"A","text":"消除软件固有的复杂性"},{"key":"B","text":"开发高质量的软件"},{"key":"C","text":"努力发挥开发人员的创造性潜能"},{"key":"D","text":"推动软件理论和技术的发展"}],"answer":"B","type":"single","explanation":"软件工程的基本目标是开发高质量的软件。"},{"id":369,"question":"编写测试计划的目的是(????????)。\n①测试工作顺利进行\n②使项目参与人员沟通更舒畅\n③使测试工作更加系统化\n④软件过程规范化的要求\n⑤控制软件质量","options":[{"key":"A","text":"②③⑤"},{"key":"B","text":"①②③"},{"key":"C","text":"①②④"},{"key":"D","text":"①②⑤"}],"answer":"B","type":"single","explanation":"编写测试计划的目的是使测试顺利进行、促进沟通和系统化。"},{"id":370,"question":"确定采用哪种软件体系结构是在(????????)阶段进行的。","options":[{"key":"A","text":"需求分析"},{"key":"B","text":"概要设计"},{"key":"C","text":"详细设计"},{"key":"D","text":"软件实现"}],"answer":"B","type":"single","explanation":"软件体系结构选择在概要设计阶段确定。"},{"id":371,"question":"以下关于模块化的叙述中，正确的是(????????)。","options":[{"key":"A","text":"每个模块的规模越小越好，这样开发每个模块的成本就可以降低了"},{"key":"B","text":"每个模块的规模越大越好，这样模块之间的通信开销就会降低了"},{"key":"C","text":"应具有高内聚和低耦合的性质"},{"key":"D","text":"仅适用于结构化开发方法"}],"answer":"C","type":"single","explanation":"模块化应追求高内聚低耦合，规模需适中，并非越小或越大越好。"},{"id":372,"question":"以下关于建立良好的程序设计风格的叙述中，正确的是(????????)。","options":[{"key":"A","text":"程序应简单、清晰、可读性好"},{"key":"B","text":"变量的命名要符合语法"},{"key":"C","text":"充分考虑程序的执行效率"},{"key":"D","text":"程序的注释可有可无"}],"answer":"A","type":"single","explanation":"良好程序设计风格应简单、清晰、可读性好，注释和命名规范很重要。"},{"id":373,"question":"计算机的内存储器与外存储器相比较(????????)。","options":[{"key":"A","text":"内存储器比外存储器容量小，但存取速度快，价格便宜"},{"key":"B","text":"内存储器比外存储器容量大，但存取速度慢，价格昂贵"},{"key":"C","text":"内存储器比外存储器容量小，价格昂贵，但存取速度快"},{"key":"D","text":"内存储器存取速度慢，价格昂贵，而且没有外存储器的容量大"}],"answer":"C","type":"single","explanation":"内存容量小、价格贵但存取速度快；外存容量大、便宜但速度慢。"},{"id":374,"question":"在进行压力测试时，通常使用(????????)工具来模拟大量用户并发请求。","options":[{"key":"A","text":"性能测试工具"},{"key":"B","text":"安全扫描工具"},{"key":"C","text":"代码审查工具"},{"key":"D","text":"缺陷管理工具"}],"answer":"A","type":"single","explanation":"压力测试使用性能测试工具模拟大量并发请求。"},{"id":375,"question":"当接口请求的资源被永久移动到新URI时，应返回(????????)状态码。","options":[{"key":"A","text":"301"},{"key":"B","text":"302"},{"key":"C","text":"304"},{"key":"D","text":"401"}],"answer":"A","type":"single","explanation":"HTTP 301表示资源被永久移动到新URI，客户端应使用新地址。"},{"id":376,"question":"下列各存储器中，存取速度最快的一种是(????????)。","options":[{"key":"A","text":"Cache"},{"key":"B","text":"动态RAM(DRAM)"},{"key":"C","text":"CD-ROM"},{"key":"D","text":"硬盘"}],"answer":"A","type":"single","explanation":"Cache存取速度最快，位于CPU和内存之间。"},{"id":377,"question":"在进行性能测试时，通常需要考虑(????????)因素。","options":[{"key":"A","text":"用户并发数"},{"key":"B","text":"数据量大小"},{"key":"C","text":"网络带宽"},{"key":"D","text":"所有上述因素"}],"answer":"D","type":"single","explanation":"性能测试需综合考虑并发数、数据量和网络带宽等因素。"},{"id":378,"question":"以下关于测试时机的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"应该尽可能早地进行测试"},{"key":"B","text":"软件中的错误暴露得越迟，则修复和改正错误所花费的代价就越高"},{"key":"C","text":"应该在代码编写完成后开始测试"},{"key":"D","text":"项目需求分析和设计阶段需要测试人员参与"}],"answer":"C","type":"single","explanation":"测试应尽早介入，代码完成后再开始测试代价高且效率低。"},{"id":379,"question":"软件的易用性包括(????????)。\n①易理解性②易学习性③易操作性④吸引性⑤依从性","options":[{"key":"A","text":"①②"},{"key":"B","text":"①②③"},{"key":"C","text":"①②③④"},{"key":"D","text":"①②③④⑤"}],"answer":"D","type":"single","explanation":"易用性包括易理解、易学习、易操作、吸引性和依从性五个方面。"},{"id":380,"question":"计算机软件系统包括(????????)。","options":[{"key":"A","text":"程序、数据和相应的文档"},{"key":"B","text":"系统软件和应用软件"},{"key":"C","text":"数据库管理系统和数据库"},{"key":"D","text":"编译系统和办公软件"}],"answer":"B","type":"single","explanation":"计算机软件系统分为系统软件和应用软件两大类。"},{"id":381,"question":"以下关于边界值测试法的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"边界值分析法不仅重视输入域边界，而且也必须考虑输出域边界"},{"key":"B","text":"边界值分析法是对等价类划分方法的补充"},{"key":"C","text":"发生在输入输出边界上的错误比发生在输入输出范围的内部的错误要少"},{"key":"D","text":"测试数据应尽可能选取边界上的值"}],"answer":"C","type":"single","explanation":"边界上的错误往往比内部更多，因此边界值法尤为重要。"},{"id":382,"question":"构成CPU的主要部件是(????????)。","options":[{"key":"A","text":"内存和控制器"},{"key":"B","text":"内存、控制器和运算器"},{"key":"C","text":"高速缓存和运算器"},{"key":"D","text":"控制器和运算器"}],"answer":"D","type":"single","explanation":"CPU主要由控制器和运算器组成。"},{"id":383,"question":"白盒测试不能发现(????????)。","options":[{"key":"A","text":"代码路径中的错误"},{"key":"B","text":"死循环"},{"key":"C","text":"逻辑错误"},{"key":"D","text":"功能错误"}],"answer":"D","type":"single","explanation":"白盒测试基于代码结构，难以发现需求层面的功能缺失或错误。"},{"id":384,"question":"在软件测试中，(????????)阶段涉及测试数据的准备。","options":[{"key":"A","text":"测试计划"},{"key":"B","text":"测试设计"},{"key":"C","text":"测试执行"},{"key":"D","text":"测试总结"}],"answer":"B","type":"single","explanation":"测试数据准备在测试设计阶段完成，为执行阶段提供基础。"},{"id":385,"question":"以下关于负载压力测试的叙述中，不正确的是(????????)。","options":[{"key":"A","text":"负载压力测试用于确认系统是否支持性能需求"},{"key":"B","text":"负载压力测试能得到系统可承受的业务量增长"},{"key":"C","text":"负载压力测试是在一定约束条件下测试系统所能承受的最大负载压力"},{"key":"D","text":"负载压力测试不用于发现不同负载场景下的速度变慢、内存泄露等问题"}],"answer":"D","type":"single","explanation":"负载压力测试正是用于发现速度变慢、内存泄漏等性能问题。"},{"id":386,"question":"以下属于静态测试方法的是(????????)。","options":[{"key":"A","text":"分支覆盖率分析"},{"key":"B","text":"复杂度分析"},{"key":"C","text":"系统压力测试"},{"key":"D","text":"路径覆盖分析"}],"answer":"B","type":"single","explanation":"复杂度分析属于静态测试方法；覆盖率和压力测试均为动态方法。"},{"id":387,"question":"软件系统的安全性是信息安全的一个重要组成部分，针对程序和数据的安全性测试与评估是软件安全性测试的重要内容，(????????)不属于安全件测试与评估的基本内容。","options":[{"key":"A","text":"用户认证机制"},{"key":"B","text":"加密机制"},{"key":"C","text":"系统能承受的并发用户量"},{"key":"D","text":"数据备份与恢复手段"}],"answer":"C","type":"single","explanation":"并发用户量属于性能测试指标，不属于安全测试内容。"},{"id":388,"question":"CPU 响应 DMA 请求是在(????????)结束时。","options":[{"key":"A","text":"一条指令执行"},{"key":"B","text":"一段程序"},{"key":"C","text":"一个时钟周期"},{"key":"D","text":"一个总线周期"}],"answer":"D","type":"single","explanation":"CPU在每个总线周期结束时响应DMA请求，释放总线控制权。"},{"id":389,"question":"在压力测试过程中，如果系统崩溃或出现严重性能下降，通常说明(????????)。","options":[{"key":"A","text":"系统功能存在缺陷"},{"key":"B","text":"系统架构不够健壮"},{"key":"C","text":"测试环境配置错误"},{"key":"D","text":"测试数据不准"}],"answer":"B","type":"single","explanation":"压力测试下系统崩溃通常说明架构设计不够健壮或存在瓶颈。"},{"id":390,"question":"性能测试中，吞吐量通常指的是(????????)。","options":[{"key":"A","text":"系统处理请求的速度"},{"key":"B","text":"单位时间内系统处理的请求数量"},{"key":"C","text":"系统存储数据的能力"},{"key":"D","text":"系统运行的时间长短"}],"answer":"B","type":"single","explanation":"吞吐量定义为单位时间内系统成功处理的请求数量。"},{"id":391,"question":"软件测试结果分析中，(????????)指标通常用于评估测试的充分性。","options":[{"key":"A","text":"缺陷修复率"},{"key":"B","text":"代码覆盖率"},{"key":"C","text":"用户满意度"},{"key":"D","text":"系统响应时间"}],"answer":"B","type":"single","explanation":"代码覆盖率是评估测试充分性的重要量化指标。"},{"id":392,"question":"在进行测试结果分析时，发现大部分缺陷集中在某个特定的测试阶段，这表明(????????)。","options":[{"key":"A","text":"该测试阶段不重要"},{"key":"B","text":"该测试阶段需要更多的关注和改进"},{"key":"C","text":"测试执行人员能力不足"},{"key":"D","text":"软件质量整体较低"}],"answer":"B","type":"single","explanation":"缺陷集中在某阶段说明该阶段存在系统性问题，需要重点关注和改进。"},{"id":393,"question":"性能测试中，如果响应时间超过预期，可能的原因是(????????)。","options":[{"key":"A","text":"测试数据不准确"},{"key":"B","text":"系统资源不足"},{"key":"C","text":"网络延迟"},{"key":"D","text":"所有上述原因都可能"}],"answer":"D","type":"single","explanation":"响应时间超标可能由资源不足、网络延迟或数据问题等多种原因导致。"},{"id":394,"question":"(????????)能确定性能测试的负载级别。","options":[{"key":"A","text":"根据经验随意设定"},{"key":"B","text":"根据实际业务场景模拟"},{"key":"C","text":"参考其他类似系统的负载"},{"key":"D","text":"由测试人员个人决定"}],"answer":"B","type":"single","explanation":"负载级别应基于实际业务场景和真实用户行为来模拟确定。"},{"id":395,"question":"(????????)是黑盒测试中的一种测试方法，它通过测试每个独立的功能模块来确保整体功能正确性。","options":[{"key":"A","text":"等价类划分"},{"key":"B","text":"边界值分析"},{"key":"C","text":"功能分解测试"},{"key":"D","text":"因果图法"}],"answer":"C","type":"single","explanation":"功能分解测试将系统拆分为独立功能模块逐一验证，确保整体正确。"},{"id":396,"question":"在黑盒测试中，测试人员主要关注(????????)类型的错误。","options":[{"key":"A","text":"语法错误"},{"key":"B","text":"逻辑错误"},{"key":"C","text":"功能错误"},{"key":"D","text":"性能错误"}],"answer":"C","type":"single","explanation":"黑盒测试基于需求规格，主要关注功能层面的错误。"},{"id":397,"question":"测试结果显示，某个模块的缺陷数量在测试周期内持续减少，这通常说明(????????)。","options":[{"key":"A","text":"该模块已经完美无缺"},{"key":"B","text":"测试工作已经足够充分"},{"key":"C","text":"模块质量正在逐步提高"},{"key":"D","text":"测试团队效率较低"}],"answer":"C","type":"single","explanation":"缺陷持续减少表明模块质量在逐步改善，但不一定意味着完美无缺。"},{"id":398,"question":"在白盒测试中，路径覆盖是指(????????)。","options":[{"key":"A","text":"每个语句至少执行一次"},{"key":"B","text":"每个分支至少执行一次"},{"key":"C","text":"程序中的每一条可能路径都至少执行一次"},{"key":"D","text":"每个条件至少为真和假各一次"}],"answer":"C","type":"single","explanation":"路径覆盖要求程序中每一条可能路径都至少执行一次，覆盖率最高。"},{"id":399,"question":"(????????)阶段主要关注测试环境的搭建和配置。","options":[{"key":"A","text":"测试计划"},{"key":"B","text":"测试设计"},{"key":"C","text":"测试准备"},{"key":"D","text":"测试执行"}],"answer":"C","type":"single","explanation":"测试准备阶段主要完成环境搭建、数据准备和工具配置。"},{"id":400,"question":"接口测试中，通常使用(????????)工具来模拟客户端请求。","options":[{"key":"A","text":"Postman"},{"key":"B","text":"JMeter"},{"key":"C","text":"Selenium"},{"key":"D","text":"Wireshark"}],"answer":"A","type":"single","explanation":"Postman是接口测试中最常用的工具，用于模拟和发送HTTP请求。"},{"id":401,"question":"在接口测试中，我们通常需要关注(????????)方面的测试。","options":[{"key":"A","text":"功能测试"},{"key":"B","text":"性能测试"},{"key":"C","text":"兼容性测试"},{"key":"D","text":"所有上述方面"}],"answer":"D","type":"single","explanation":"接口测试需关注功能、性能和兼容性等多个质量维度。"},{"id":402,"question":"如果在软件测试结果分析中发现资源消耗异常，最应该检查(????????)方面。","options":[{"key":"A","text":"用户界面设计"},{"key":"B","text":"系统配置"},{"key":"C","text":"代码逻辑"},{"key":"D","text":"测试环境"}],"answer":"D","type":"single","explanation":"资源消耗异常应先排查测试环境配置是否合理，排除环境干扰后再分析代码。"},{"id":403,"question":"如果一个接口返回了404状态码，通常表示(????????)。","options":[{"key":"A","text":"请求成功"},{"key":"B","text":"请求的资源未找到"},{"key":"C","text":"请求错误"},{"key":"D","text":"服务器内部错误"}],"answer":"B","type":"single","explanation":"404状态码表示请求的资源在服务器上未找到，需检查URL是否正确。"},{"id":404,"question":"接口测试中，模拟用户的大量并发请求的方法是(????????)","options":[{"key":"A","text":"使用多个测试人员同时请求"},{"key":"B","text":"使用性能测试工具"},{"key":"C","text":"增加服务器的硬件配置"},{"key":"D","text":"无需模拟，直接测试"}],"answer":"B","type":"single","explanation":"性能测试工具可模拟大量并发请求，是接口压力测试的主要手段。"},{"id":405,"question":"在进行接口测试时，需要对接口参数进行边界值测试的原因是(????????)。","options":[{"key":"A","text":"确保接口能够处理异常情况"},{"key":"B","text":"检查接口是否支持多种数据类型"},{"key":"C","text":"测试接口的最大处理能力"},{"key":"D","text":"验证接口返回值的格式"}],"answer":"A","type":"single","explanation":"边界值测试能验证接口在异常和边界输入下的处理能力和健壮性。"},{"id":406,"question":"在进行压力测试前，通常需要准备(????????)内容","options":[{"key":"A","text":"详细的测试计划"},{"key":"B","text":"足够多的测试人员"},{"key":"C","text":"高性能的测试环境"},{"key":"D","text":"所有上述内容"}],"answer":"D","type":"single","explanation":"压力测试前需准备详细计划、足够人员和性能良好的测试环境。"},{"id":407,"question":"压力测试中，(????????)能确定系统的最大负载能力。","options":[{"key":"A","text":"根据经验估计"},{"key":"B","text":"通过逐步增加负载并观察系统表现来确定"},{"key":"C","text":"查阅系统文档"},{"key":"D","text":"询问系统开发人员"}],"answer":"B","type":"single","explanation":"通过逐步增加负载并观察系统表现，可精确确定系统最大负载能力。"},{"id":408,"question":"在压力测试过程中，如果发现系统响应时间逐渐增长，可能的原因是(????????)。","options":[{"key":"A","text":"测试数据不准确"},{"key":"B","text":"系统资源不足"},{"key":"C","text":"网络带宽受限"},{"key":"D","text":"所有上述原因都可能"}],"answer":"D","type":"single","explanation":"响应时间增长可能由资源不足、网络瓶颈或测试数据问题等多种因素导致。"},{"id":409,"question":"(????????)状态码表示客户端未通过服务器的身份验证。","options":[{"key":"A","text":"301"},{"key":"B","text":"302"},{"key":"C","text":"401"},{"key":"D","text":"403"}],"answer":"C","type":"single","explanation":"HTTP 401表示客户端未提供有效身份认证信息，服务器拒绝访问。"},{"id":410,"question":"接口测试中的安全性测试主要关注(????????)。","options":[{"key":"A","text":"接口的响应时间"},{"key":"B","text":"接口的输入验证"},{"key":"C","text":"接口的加密方式"},{"key":"D","text":"接口的返回值"}],"answer":"B","type":"single","explanation":"接口安全测试重点关注输入验证，防止注入、越权等安全漏洞。"},{"id":411,"question":"接口测试中，通常使用(????????)方法来检查接口返回的数据。","options":[{"key":"A","text":"断言"},{"key":"B","text":"日志分析"},{"key":"C","text":"性能测试"},{"key":"D","text":"代码审查"}],"answer":"A","type":"single","explanation":"断言是接口自动化测试中验证返回数据是否符合预期的核心方法。"},{"id":412,"question":"接口测试中的压力测试主要用于测试(????????)。","options":[{"key":"A","text":"接口的响应时间"},{"key":"B","text":"接口的稳定性"},{"key":"C","text":"接口的并发处理能力"},{"key":"D","text":"接口的数据准确性"}],"answer":"C","type":"single","explanation":"接口压力测试主要验证接口在高并发场景下的处理能力和稳定性。"},{"id":413,"question":"接口文档在接口测试中起到的作用是(????????)。","options":[{"key":"A","text":"指导测试人员编写测试用例"},{"key":"B","text":"替代测试人员进行测试"},{"key":"C","text":"提供接口的实现细节"},{"key":"D","text":"确定接口的开发进度"}],"answer":"A","type":"single","explanation":"接口文档描述接口地址、参数和返回值，是编写测试用例的重要依据。"},{"id":414,"question":"在进行软件测试时，测试人员的主要任务是(????????)。","options":[{"key":"A","text":"编写代码"},{"key":"B","text":"修复缺陷"},{"key":"C","text":"执行测试用例"},{"key":"D","text":"设计软件架构"}],"answer":"C","type":"single","explanation":"测试人员的核心任务是执行测试用例、记录结果和报告缺陷。"},{"id":415,"question":"在进行黑盒测试时，测试人员主要关注(????????)。","options":[{"key":"A","text":"代码内部结构"},{"key":"B","text":"程序的外部特性"},{"key":"C","text":"测试覆盖率"},{"key":"D","text":"代码性能"}],"answer":"B","type":"single","explanation":"黑盒测试关注程序外部功能和用户可见的行为，不关注内部代码结构。"},{"id":416,"question":"在进行集成测试时，测试人员主要检查(????????)。","options":[{"key":"A","text":"模块内部的逻辑"},{"key":"B","text":"模块之间的接口"},{"key":"C","text":"用户界面的可用性"},{"key":"D","text":"系统的整体性能"}],"answer":"B","type":"single","explanation":"集成测试验证模块间接口和交互，确保组装后的系统协同工作。"},{"id":417,"question":"在分析软件测试结果时，发现某个新版本的性能相比之前版本有所下降，以下(????????)措施可能是最有效的。","options":[{"key":"A","text":"增加测试人员数量"},{"key":"B","text":"重新设计用户界面"},{"key":"C","text":"对性能瓶颈进行调优"},{"key":"D","text":"减少功能需求"}],"answer":"C","type":"single","explanation":"性能下降应定位瓶颈并进行调优，增加人员或削减需求不能解决根本问题。"},{"id":418,"question":"在进行软件测试时，回归测试主要用于(????????)。","options":[{"key":"A","text":"测试新添加的功能"},{"key":"B","text":"重新测试已修复的缺陷"},{"key":"C","text":"评估测试进度"},{"key":"D","text":"确定测试范围"}],"answer":"B","type":"single","explanation":"回归测试在缺陷修复后重新执行相关用例，验证修改未引入新问题。"},{"id":419,"question":"在软件测试实施中，(????????)阶段涉及测试资源的分配。","options":[{"key":"A","text":"测试计划"},{"key":"B","text":"测试设计"},{"key":"C","text":"测试执行"},{"key":"D","text":"测试总结"}],"answer":"A","type":"single","explanation":"测试计划阶段负责分配人力、时间和工具等测试资源。"},{"id":420,"question":"冒烟测试使用的目的是(????????)。","options":[{"key":"A","text":"检查软件的主要功能是否工作"},{"key":"B","text":"评估软件的性能"},{"key":"C","text":"检查软件的安全性"},{"key":"D","text":"确定软件的缺陷密度"}],"answer":"A","type":"single","explanation":"冒烟测试快速验证软件主要功能是否可用，决定是否进入详细测试。"},{"id":421,"question":"在进行性能测试时，测试人员主要关注(????????)。","options":[{"key":"A","text":"代码质量"},{"key":"B","text":"系统响应时间"},{"key":"C","text":"用户界面设计"},{"key":"D","text":"软件缺陷数量"}],"answer":"B","type":"single","explanation":"性能测试重点关注系统响应时间、吞吐量和资源利用率等指标。"},{"id":422,"question":"计算机的技术性能指标主要是指(????????)。","options":[{"key":"A","text":"计算机所配备的语言、操作系统、外部设备"},{"key":"B","text":"硬盘的容量和内存的容量"},{"key":"C","text":"显示器的分辨率、打印机的性能等配置"},{"key":"D","text":"字长、运算速度、内/外存容量和CPU的时钟频率"}],"answer":"D","type":"single","explanation":"计算机主要性能指标包括字长、运算速度、存储容量和CPU时钟频率。"},{"id":423,"question":"软件测试员在职业道德方面应遵守的原则包括(????????)。","options":[{"key":"A","text":"尊重并保护知识产权"},{"key":"B","text":"随意泄露测试数据和结果"},{"key":"C","text":"严格遵守保密协议和规定"},{"key":"D","text":"公正、客观地评估软件质量"},{"key":"E","text":"随意查看和分享用户数据"}],"answer":"ACD","type":"multiple","explanation":"测试员应尊重知识产权、遵守保密规定并公正客观地评估软件质量。"},{"id":424,"question":"关于软件测试，下列叙述不正确的(????????)。","options":[{"key":"A","text":"测试开始越早，越有利于发现软件缺陷"},{"key":"B","text":"采用正确的测试用例设计方法，软件测试可以做到穷举测试"},{"key":"C","text":"测试覆盖度和测试用例数量成正比"},{"key":"D","text":"软件测试的时间越长越好"},{"key":"E","text":"软件测试的目的是在软件投入运行之前，以最少的人力和时间发现软件中潜在的各种错误。"}],"answer":"BCD","type":"multiple","explanation":"穷举测试通常不可行，覆盖度与用例质量而非数量成正比，测试时间需合理。"},{"id":425,"question":"在软件测试准备阶段，以下(????????)活动是必要的。","options":[{"key":"A","text":"确定测试目标和范围"},{"key":"B","text":"编写测试计划"},{"key":"C","text":"修复所有已知缺陷"},{"key":"D","text":"评审测试用例"},{"key":"E","text":"准备所有可能的测试数据"}],"answer":"ABD","type":"multiple","explanation":"测试准备阶段需确定目标范围、编写计划和评审用例，修复缺陷属开发活动。"},{"id":426,"question":"在软件测试实施过程中，测试人员通常需要执行(????????)任务。","options":[{"key":"A","text":"编写测试用例"},{"key":"B","text":"执行测试用例"},{"key":"C","text":"记录测试结果"},{"key":"D","text":"修复软件缺陷"},{"key":"E","text":"部署软件到生产环境"}],"answer":"BC","type":"multiple","explanation":"测试实施阶段主要任务是执行用例和记录结果，修复缺陷由开发人员负责。"},{"id":427,"question":"在执行测试用例时，测试人员需要注意的方面是(????????)。","options":[{"key":"A","text":"测试数据的准备"},{"key":"B","text":"测试环境的搭建"},{"key":"C","text":"测试步骤的执行"},{"key":"D","text":"缺陷的修复进度"},{"key":"E","text":"项目预算的分配"}],"answer":"ABC","type":"multiple","explanation":"执行用例时需关注数据准备、环境搭建和步骤执行的准确性。"},{"id":428,"question":"在进行软件测试结果分析时，测试人员通常需要考虑的因素是(????????)。","options":[{"key":"A","text":"缺陷的数量"},{"key":"B","text":"缺陷的严重程度"},{"key":"C","text":"测试用例的执行情况"},{"key":"D","text":"软件的开发进度"},{"key":"E","text":"项目团队成员的个人情感"}],"answer":"ABC","type":"multiple","explanation":"结果分析需考虑缺陷数量、严重程度和用例执行情况，排除无关因素。"},{"id":429,"question":"缺陷分析是软件测试结果分析的重要组成部分，主要包括的内容有(????????)","options":[{"key":"A","text":"缺陷的分布情况"},{"key":"B","text":"缺陷的性质和类型"},{"key":"C","text":"缺陷的产生原因"},{"key":"D","text":"缺陷的修复人员"},{"key":"E","text":"缺陷的影响范围"}],"answer":"ABCE","type":"multiple","explanation":"缺陷分析包括分布、类型、原因和影响范围，帮助团队识别系统性问题。"},{"id":430,"question":"软件测试结果分析可以帮助团队实现的目标是()","options":[{"key":"A","text":"评估软件的质量"},{"key":"B","text":"确定测试的有效性"},{"key":"C","text":"预测软件的发布日期"},{"key":"D","text":"优化测试策略"},{"key":"E","text":"确定软件的市场定位"}],"answer":"ABD","type":"multiple","explanation":"结果分析可评估质量、确定测试有效性和优化策略，但不能决定市场定位。"},{"id":431,"question":"在分析测试结果时，以下(????????)数据对评估软件的可靠性至关重要。","options":[{"key":"A","text":"缺陷的发现率"},{"key":"B","text":"缺陷的修复率"},{"key":"C","text":"软件的崩溃次数"},{"key":"D","text":"用户的反馈意见"},{"key":"E","text":"软件的开发效率"}],"answer":"ABCD","type":"multiple","explanation":"缺陷发现率、修复率、崩溃次数和用户反馈是评估可靠性的关键数据。"},{"id":432,"question":"在软件测试准备阶段，测试人员通常需要准备的内容是(????????)。","options":[{"key":"A","text":"测试用例"},{"key":"B","text":"测试环境"},{"key":"C","text":"测试数据"},{"key":"D","text":"源代码"},{"key":"E","text":"软件部署环境"}],"answer":"ABC","type":"multiple","explanation":"测试准备阶段需准备测试用例、环境和数据，源代码由开发团队管理。"},{"id":433,"question":"测试人员或者其它资源不足能作为测试结束标准。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"资源不足不能作为测试结束标准，应申请资源或调整测试策略和范围。"},{"id":434,"question":"代码审查属于静态测试方法。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"代码审查不执行程序，通过阅读代码发现缺陷，属于静态测试方法。"},{"id":435,"question":"验收测试由开发方主导，用户参与。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"验收测试由用户或客户主导，开发方提供支持，不能由开发方主导。"},{"id":436,"question":"吞吐量和延迟不属于网络测试的测试指标。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"吞吐量和延迟是衡量网络性能的核心指标，属于网络测试的重要内容。"},{"id":437,"question":"在自动化测试中，测试脚本一旦编写完成，就不需要再进行修改或维护。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"测试脚本需随需求变更持续维护更新，不能编写完成后就不再修改。"},{"id":438,"question":"对计算机评价的主要性能指标有时钟频率、数据处理速率、运算精度、内存容量等。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"时钟频率、数据处理速率、运算精度和内存容量是计算机主要性能指标。"},{"id":439,"question":"软件测试员在团队中应尊重并信任团队成员，积极分享测试经验和技巧。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"测试员应尊重信任团队成员，积极分享经验，营造良好的团队协作氛围。"},{"id":440,"question":"系统交付后，修改原来打印时总是遗漏最后一行记录的问题，该行为属于改正性维护。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"A","type":"judge","explanation":"修复软件运行中的错误属于改正性维护，目的是恢复软件正确功能。"},{"id":441,"question":"系统性能测试属于单元测试测试内容。(????????)","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"系统性能测试验证整体性能表现，属于系统测试而非单元测试范畴。"},{"id":442,"question":"软件测试员在与客户沟通时，应尽可能隐瞒软件中的潜在问题，以维持良好的客户关系。","options":[{"key":"A","text":"正确"},{"key":"B","text":"错误"}],"answer":"B","type":"judge","explanation":"测试员应诚实客观地报告问题，隐瞒缺陷违背职业道德并损害客户利益。"}];
let examQuestions = [];
let answers = {};
let currentIndex = 0;
let timerInterval = null;
let startTime = 0;
let marked = new Set();

let practiceQuestions = [];
let practiceIndex = 0;
let practiceAnswers = {};
let practiceChecked = new Set();

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

function showPage(id) {
  ['page-home', 'page-exam', 'page-result', 'page-practice', 'page-practice-summary'].forEach(p => document.getElementById(p).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo(0, 0);
}

function goHome() {
  if (timerInterval) clearInterval(timerInterval);
  showPage('page-home');
}

/* ========== Exam Mode ========== */
function startExam() {
  const shuffled = shuffle(ALL_QUESTIONS);
  const single = shuffled.filter(function(q){ return q.type === 'single'; });
  const multiple = shuffled.filter(function(q){ return q.type === 'multiple'; });
  const judge = shuffled.filter(function(q){ return q.type === 'judge'; });
  examQuestions = [];
  for (var i = 0; i < 70; i++) examQuestions.push(single[i % single.length]);
  for (var i = 0; i < 20; i++) examQuestions.push(multiple[i % multiple.length]);
  for (var i = 0; i < 10; i++) examQuestions.push(judge[i % judge.length]);
  answers = {};
  currentIndex = 0;
  marked = new Set();
  startTime = Date.now();
  showPage('page-exam');
  updateProgress();
  renderNav();
  renderQuestion();
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const el = document.getElementById('timer');
  timerInterval = setInterval(() => {
    const sec = Math.floor((Date.now() - startTime) / 1000);
    el.textContent = formatTime(sec);
  }, 1000);
}

function updateProgress() {
  const answered = Object.values(answers).filter(a => a.length > 0).length;
  const pct = (answered / 90) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = answered + ' / 90';
}

function toggleNav() {
  const header = document.getElementById('nav-header');
  const body = document.getElementById('nav-body');
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function renderNav() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = '';
  examQuestions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.textContent = i + 1;
    if (answers[q.id] && answers[q.id].length) div.classList.add('answered');
    if (i === currentIndex) div.classList.add('current');
    if (marked.has(q.id)) div.classList.add('marked');
    div.onclick = () => { currentIndex = i; renderQuestion(); };
    grid.appendChild(div);
  });
}

function renderQuestion() {
  const q = examQuestions[currentIndex];
  document.getElementById('q-num').textContent = currentIndex + 1;
  const typeEl = document.getElementById('q-type');
  let typeText = '单选';
  if (q.type === 'multiple') typeText = '多选';
  else if (q.type === 'judge') typeText = '判断';
  typeEl.textContent = typeText;
  typeEl.className = 'q-type ' + q.type;
  document.getElementById('q-title').innerHTML = escapeHtml(q.question).replace(/\n/g, '<br>');

  const optsEl = document.getElementById('q-options');
  optsEl.innerHTML = '';
  const type = q.type === 'multiple' ? 'checkbox' : 'radio';
  const name = 'opt-' + q.id;
  const userAns = answers[q.id] || [];

  q.options.forEach(opt => {
    const label = document.createElement('label');
    label.className = 'option';
    if (userAns.includes(opt.key)) label.classList.add('selected');

    const input = document.createElement('input');
    input.type = type;
    input.name = name;
    input.value = opt.key;
    input.checked = userAns.includes(opt.key);
    input.onchange = () => onOptionChange(q, type);

    const span = document.createElement('span');
    span.className = 'option-text';
    span.innerHTML = '<span class="option-key">' + opt.key + '</span>' + escapeHtml(opt.text);

    label.appendChild(input);
    label.appendChild(span);
    optsEl.appendChild(label);
  });

  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === examQuestions.length - 1;
  const markBtn = document.getElementById('btn-mark');
  markBtn.textContent = marked.has(q.id) ? '取消标记' : '标记';

  renderNav();
  updateProgress();
}

function onOptionChange(q, type) {
  const inputs = document.querySelectorAll('input[name="opt-' + q.id + '"]');
  const vals = Array.from(inputs).filter(i => i.checked).map(i => i.value);
  answers[q.id] = vals;

  inputs.forEach(inp => {
    const label = inp.closest('.option');
    if (inp.checked) label.classList.add('selected');
    else label.classList.remove('selected');
  });

  renderNav();
  updateProgress();
}

function prevQuestion() {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
}

function nextQuestion() {
  if (currentIndex < examQuestions.length - 1) { currentIndex++; renderQuestion(); }
}

function markCurrent() {
  const q = examQuestions[currentIndex];
  if (marked.has(q.id)) marked.delete(q.id);
  else marked.add(q.id);
  renderQuestion();
}

function submitExam() {
  const answered = Object.values(answers).filter(a => a.length > 0).length;
  let msg = '确定要提交试卷吗？';
  if (answered < 90) msg += '\n你还有 ' + (90 - answered) + ' 题未作答。';
  if (!confirm(msg)) return;
  if (timerInterval) clearInterval(timerInterval);
  showResult();
}

function showResult() {
  showPage('page-result');
  let correct = 0, wrong = 0, empty = 0;
  examQuestions.forEach(q => {
    const ua = answers[q.id] || [];
    if (ua.length === 0) { empty++; }
    else {
      const userSorted = ua.slice().sort().join('');
      const ansSorted = q.answer.split('').sort().join('');
      if (userSorted === ansSorted) correct++;
      else wrong++;
    }
  });

  const pct = Math.round((correct / 90) * 100);
  document.getElementById('donut-text').textContent = pct + '%';
  document.getElementById('meta-correct').textContent = correct;
  document.getElementById('meta-wrong').textContent = wrong;
  document.getElementById('meta-empty').textContent = empty;

  const circumference = 2 * Math.PI * 60;
  const offset = circumference - (correct / 90) * circumference;
  requestAnimationFrame(() => {
    document.getElementById('donut-fill').style.strokeDashoffset = offset;
  });

  renderResultList('all');
}

function renderResultList(filter) {
  const list = document.getElementById('result-list');
  list.innerHTML = '';
  examQuestions.forEach((q, idx) => {
    const ua = answers[q.id] || [];
    const userSorted = ua.slice().sort().join('');
    const ansSorted = q.answer.split('').sort().join('');
    let status = '';
    if (ua.length === 0) status = 'empty';
    else if (userSorted === ansSorted) status = 'correct';
    else status = 'wrong';

    if (filter !== 'all' && filter !== status) return;

    const item = document.createElement('div');
    item.className = 'r-item';
    item.dataset.open = 'false';

    const statusText = status === 'correct' ? '正确' : (status === 'wrong' ? '错误' : '未答');
    const userAnsText = ua.length ? ua.sort().join('、') : '—';
    const correctAnsText = q.answer.split('').sort().join('、');

    let optionsHtml = '';
    q.options.forEach(opt => {
      let cls = 'r-opt';
      const isCorrect = q.answer.includes(opt.key);
      const isChosen = ua.includes(opt.key);
      if (isCorrect) cls += ' correct';
      else if (isChosen && !isCorrect) cls += ' wrong';
      optionsHtml += '<div class="' + cls + '">' + opt.key + '. ' + escapeHtml(opt.text) + '</div>';
    });

    item.innerHTML =
      '<div class="r-summary" onclick="toggleResultItem(this)">' +
        '<span class="r-badge ' + status + '">' + statusText + '</span>' +
        '<span class="r-title">' + (idx + 1) + '. ' + escapeHtml(q.question).replace(/\n/g, ' ') + '</span>' +
        '<span class="r-arrow">▼</span>' +
      '</div>' +
      '<div class="r-detail"><div class="r-body">' +
        '<div class="r-options">' + optionsHtml + '</div>' +
        '<div class="r-answer-row">' +
          '<span>你的答案：<strong>' + userAnsText + '</strong></span>' +
          '<span>正确答案：<strong style="color:var(--success);">' + correctAnsText + '</strong></span>' +
        '</div>' +
      '</div></div>';
    list.appendChild(item);
  });
}

function toggleResultItem(el) {
  const item = el.closest('.r-item');
  item.classList.toggle('open');
}

function filterResult(type, btn) {
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResultList(type);
}

/* ========== Practice Mode ========== */
function startPractice() {
  practiceQuestions = shuffle(ALL_QUESTIONS);
  practiceIndex = 0;
  practiceAnswers = {};
  practiceChecked = new Set();
  showPage('page-practice');
  renderPracticeQuestion();
}

function renderPracticeQuestion() {
  const q = practiceQuestions[practiceIndex];
  document.getElementById('p-num').textContent = practiceIndex + 1;
  const typeEl = document.getElementById('p-type');
  let typeText = '单选';
  if (q.type === 'multiple') typeText = '多选';
  else if (q.type === 'judge') typeText = '判断';
  typeEl.textContent = typeText;
  typeEl.className = 'q-type ' + q.type;
  document.getElementById('p-title').innerHTML = escapeHtml(q.question).replace(/\n/g, '<br>');

  const pct = ((practiceIndex + 1) / practiceQuestions.length) * 100;
  document.getElementById('practice-progress-bar').style.width = pct + '%';
  document.getElementById('practice-progress-text').textContent = (practiceIndex + 1) + ' / ' + practiceQuestions.length;

  const optsEl = document.getElementById('p-options');
  optsEl.innerHTML = '';
  const type = q.type === 'multiple' ? 'checkbox' : 'radio';
  const name = 'p-opt-' + q.id;
  const userAns = practiceAnswers[q.id] || [];
  const isChecked = practiceChecked.has(q.id);

  q.options.forEach(opt => {
    const label = document.createElement('label');
    label.className = 'option';
    const isCorrect = q.answer.includes(opt.key);
    const isChosen = userAns.includes(opt.key);

    if (isChecked) {
      if (isCorrect) label.classList.add('correct');
      else if (isChosen) label.classList.add('wrong-option');
    } else if (isChosen) {
      label.classList.add('selected');
    }

    const input = document.createElement('input');
    input.type = type;
    input.name = name;
    input.value = opt.key;
    input.checked = isChosen;
    input.disabled = isChecked;
    input.onchange = () => onPracticeOptionChange(q);

    const span = document.createElement('span');
    span.className = 'option-text';
    span.innerHTML = '<span class="option-key">' + opt.key + '</span>' + escapeHtml(opt.text);

    label.appendChild(input);
    label.appendChild(span);
    optsEl.appendChild(label);
  });

  const confirmWrap = document.getElementById('p-confirm-wrap');
  const resultDiv = document.getElementById('p-result');
  const nextBtn = document.getElementById('btn-p-next');
  const prevBtn = document.getElementById('btn-p-prev');

  if (isChecked) {
    confirmWrap.style.display = 'none';
    resultDiv.classList.remove('hidden');
    nextBtn.classList.remove('hidden');
    const ua = userAns.slice().sort().join('');
    const ca = q.answer.split('').sort().join('');
    const isCorrect = ua === ca;
    const statusEl = document.getElementById('p-result-status');
    statusEl.textContent = isCorrect ? '✓ 回答正确' : '✗ 回答错误';
    statusEl.style.color = isCorrect ? 'var(--success)' : 'var(--danger)';
    document.getElementById('p-user-ans').textContent = userAns.length ? userAns.sort().join('、') : '无';
    document.getElementById('p-correct-ans').textContent = q.answer.split('').sort().join('、');
    const expEl = document.getElementById('p-explanation');
    if (!isCorrect && q.explanation) {
      expEl.style.display = 'block';
      expEl.innerHTML = '<strong style="color:var(--warning);">解析：</strong>' + escapeHtml(q.explanation);
    } else {
      expEl.style.display = 'none';
      expEl.textContent = '';
    }
  } else {
    confirmWrap.style.display = q.type === 'multiple' ? 'block' : 'none';
    resultDiv.classList.add('hidden');
    nextBtn.classList.add('hidden');
  }

  prevBtn.disabled = practiceIndex === 0;
  nextBtn.textContent = practiceIndex === practiceQuestions.length - 1 ? '完成' : '下一题';
}

function onPracticeOptionChange(q) {
  const inputs = document.querySelectorAll('input[name="p-opt-' + q.id + '"]');
  const vals = Array.from(inputs).filter(i => i.checked).map(i => i.value);
  practiceAnswers[q.id] = vals;

  inputs.forEach(inp => {
    const label = inp.closest('.option');
    if (inp.checked) label.classList.add('selected');
    else label.classList.remove('selected');
  });

  if (q.type === 'single') {
    confirmPracticeAnswer();
  }
}

function confirmPracticeAnswer() {
  const q = practiceQuestions[practiceIndex];
  const ua = practiceAnswers[q.id] || [];
  if (ua.length === 0) {
    alert('请至少选择一个答案');
    return;
  }
  practiceChecked.add(q.id);
  renderPracticeQuestion();
}

function nextPractice() {
  if (practiceIndex < practiceQuestions.length - 1) {
    practiceIndex++;
    renderPracticeQuestion();
  } else {
    showPracticeSummary();
  }
}

function prevPractice() {
  if (practiceIndex > 0) {
    practiceIndex--;
    renderPracticeQuestion();
  }
}

function showPracticeSummary() {
  showPage('page-practice-summary');
  let correct = 0, wrong = 0;
  practiceQuestions.forEach(q => {
    const ua = practiceAnswers[q.id] || [];
    if (ua.length === 0) { wrong++; }
    else {
      const userSorted = ua.slice().sort().join('');
      const ansSorted = q.answer.split('').sort().join('');
      if (userSorted === ansSorted) correct++;
      else wrong++;
    }
  });
  const pct = Math.round((correct / practiceQuestions.length) * 100);
  document.getElementById('practice-donut-text').textContent = pct + '%';
  document.getElementById('practice-meta-correct').textContent = correct;
  document.getElementById('practice-meta-wrong').textContent = wrong;
  const circumference = 2 * Math.PI * 60;
  const offset = circumference - (correct / practiceQuestions.length) * circumference;
  requestAnimationFrame(() => {
    document.getElementById('practice-donut-fill').style.strokeDashoffset = offset;
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/* Keyboard shortcuts */
document.addEventListener('keydown', (e) => {
  if (document.getElementById('page-exam').classList.contains('hidden') === false) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevQuestion(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextQuestion(); }
    else if (e.key === 'm' || e.key === 'M') { e.preventDefault(); markCurrent(); }
    else if (e.key >= '1' && e.key <= '5') {
      const idx = parseInt(e.key, 10) - 1;
      const q = examQuestions[currentIndex];
      if (q && q.options[idx]) {
        const inp = document.querySelector('#page-exam input[value="' + q.options[idx].key + '"]');
        if (inp) {
          e.preventDefault();
          if (q.type === 'multiple') inp.checked = !inp.checked;
          else inp.checked = true;
          inp.dispatchEvent(new Event('change'));
        }
      }
    }
  } else if (document.getElementById('page-practice').classList.contains('hidden') === false) {
    if (e.target.tagName === 'INPUT') return;
    const q = practiceQuestions[practiceIndex];
    const isChecked = q && practiceChecked.has(q.id);

    if (e.key === 'ArrowLeft') { e.preventDefault(); prevPractice(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); if (isChecked) nextPractice(); }
    else if (e.key >= '1' && e.key <= '5') {
      const idx = parseInt(e.key, 10) - 1;
      if (q && !isChecked && q.options[idx]) {
        const inp = document.querySelector('#page-practice input[value="' + q.options[idx].key + '"]');
        if (inp) {
          e.preventDefault();
          if (q.type === 'multiple') inp.checked = !inp.checked;
          else inp.checked = true;
          inp.dispatchEvent(new Event('change'));
        }
      }
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (q && !isChecked && q.type === 'multiple') {
        confirmPracticeAnswer();
      } else if (isChecked) {
        nextPractice();
      }
    }
  }
});
</script>
